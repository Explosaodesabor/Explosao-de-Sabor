<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel de Vendas</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  padding: 20px;
}

.painel {
  background: white;
  padding: 20px;
  border-radius: 12px;
  max-width: 500px;
  margin: auto;
}

h2 {
  text-align: center;
}

p {
  font-size: 16px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border: none;
  border-radius: 10px;
  background: #4caf50;
  color: white;
}
</style>
</head>

<body>

<div class="painel">
  <h2>📊 Painel de Vendas</h2>
  <div id="painel"></div>
  <button onclick="resetar()">🔄 Zerar Dados</button>
</div>

<script>

function mostrarPainel() {
  let pedidos = localStorage.getItem("listaPedidos");
  pedidos = pedidos ? JSON.parse(pedidos) : [];

  const resumo = {};
  let totalGeral = 0;
  let totalFrete = 0;

  pedidos.forEach(pedido => {
    totalGeral += pedido.total;
    totalFrete += pedido.frete;

    pedido.itens.forEach(item => {
      if (!resumo[item.nome]) {
        resumo[item.nome] = {
          quantidade: 0,
          faturamento: 0
        };
      }

      resumo[item.nome].quantidade += 1;
      resumo[item.nome].faturamento += item.preco;
    });
  });

  const div = document.getElementById("painel");

  div.innerHTML = "<h3>📦 Itens vendidos</h3>";

  Object.entries(resumo)
    .sort((a, b) => b[1].quantidade - a[1].quantidade)
    .forEach(([nome, dados]) => {
      div.innerHTML += `
        <p>${nome} — ${dados.quantidade} vendidos — R$ ${dados.faturamento.toFixed(2)}</p>
      `;
    });

  div.innerHTML += `<hr>`;
  div.innerHTML += `<p>🚚 Frete: R$ ${totalFrete.toFixed(2)}</p>`;
  div.innerHTML += `<p><strong>💰 Total: R$ ${totalGeral.toFixed(2)}</strong></p>`;
}

function resetar() {
  localStorage.removeItem("listaPedidos");
  mostrarPainel();
}

mostrarPainel();

</script>

</body>
</html>
