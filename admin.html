<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Admin - Explosão de Sabor</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
margin:0;
background:#0b0b0b;
color:white;
}

/* LOGIN */

.login{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.logo-login{
width:220px;
margin-bottom:20px;
}

.login input{
padding:10px;
border-radius:8px;
border:none;
margin-top:10px;
}

.login button{
margin-top:10px;
padding:10px 20px;
border:none;
background:#ff6600;
color:white;
border-radius:8px;
cursor:pointer;
}

/* PAINEL */

.painel{
display:none;
padding:20px;
background:#1b1b1b;
color:white;
min-height:100vh;
}

.logo-painel{
width:160px;
margin-bottom:10px;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-top:20px;
}

.card{
padding:20px;
border-radius:10px;
color:white;
box-shadow:0 2px 8px rgba(0,0,0,0.4);
}

.card.produtos{
background:#1e88e5;
}

.card.frete{
background:#43a047;
}

.card.faturamento{
background:#00acc1;
}

.card.pedidos{
background:#6d4c41;
}

.card.lucro{
background:#8e24aa;
}

.valor{
font-size:22px;
font-weight:bold;
margin-top:5px;
}

/* SEÇÕES */

.section{
background:#2a2a2a;
padding:20px;
border-radius:10px;
margin-top:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.3);
}

/* TABELA */

table{
width:100%;
border-collapse:collapse;
color:white;
}

th,td{
padding:10px;
border-bottom:1px solid #444;
}

/* BOTÕES */

button{
padding:8px 12px;
border:none;
border-radius:6px;
background:#ff6600;
color:white;
cursor:pointer;
}

.excluir{
background:#e53935;
}

/* DESPESAS */

.despesa-item{
display:flex;
justify-content:space-between;
background:#333;
padding:8px;
margin-top:5px;
border-radius:6px;
}

</style>
</head>

<body>

<div class="login" id="login">

<img src="logo.png" class="logo-login">

<h2>Painel ADMIN</h2>

<input type="password" id="senha" placeholder="Digite a senha">

<button onclick="entrar()">Entrar</button>

</div>

<div class="painel" id="painel">

<img src="logo.png" class="logo-painel">

<h1>Painel Explosão de Sabor</h1>

<label>Filtrar data</label>
<input type="date" id="filtroData" onchange="atualizar()">

<div class="cards">

<div class="card produtos">
Produtos
<div class="valor" id="produtosTotal">0</div>
</div>

<div class="card frete">
Frete
<div class="valor" id="freteTotal">0</div>
</div>

<div class="card faturamento">
Faturamento
<div class="valor" id="faturamentoTotal">0</div>
</div>

<div class="card pedidos">
Pedidos
<div class="valor" id="pedidosTotal">0</div>
</div>

<div class="card lucro">
Lucro
<div class="valor" id="lucroTotal">0</div>
</div>

</div>

<div class="section">

<h2>Estatísticas</h2>

Produto mais vendido:
<strong id="topProduto"></strong><br><br>

Ticket médio:
<strong id="ticketMedio"></strong>

</div>

<div class="section">

<h2>Gráfico financeiro</h2>

<canvas id="grafico"></canvas>

</div>

<div class="section">

<h2>Pedidos</h2>

<table>

<thead>
<tr>
<th>Data</th>
<th>Itens</th>
<th>Produtos</th>
<th>Frete</th>
<th>Total</th>
</tr>
</thead>

<tbody id="listaPedidos"></tbody>

</table>

</div>

<div class="section">

<h2>Despesas</h2>

<input id="descDespesa" placeholder="Descrição">
<input id="valorDespesa" type="number" placeholder="Valor">

<button onclick="addDespesa()">Adicionar</button>

<div id="listaDespesas"></div>

</div>

</div>

<script>

/* TODO SEU SCRIPT ORIGINAL FOI MANTIDO */

const senhaAdmin="admin123";

let grafico;

function entrar(){

let senha=document.getElementById("senha").value;

if(senha===senhaAdmin){

document.getElementById("login").style.display="none";
document.getElementById("painel").style.display="block";

atualizar();

}else{

alert("Senha incorreta");

}

}

function atualizar(){

let pedidos=JSON.parse(localStorage.getItem("pedidos"))||[];
let despesas=JSON.parse(localStorage.getItem("despesas"))||[];

let filtro=document.getElementById("filtroData").value;

let pedidosFiltrados=pedidos;

if(filtro){

pedidosFiltrados=pedidos.filter(p=>{

let dataPedido=new Date(p.data).toISOString().split("T")[0];

return dataPedido===filtro;

});

}

let produtosTotal=0;
let freteTotal=0;

let lista=document.getElementById("listaPedidos");
lista.innerHTML="";

let produtosContagem={};

pedidosFiltrados.forEach(p=>{

produtosTotal+=Number(p.total);
freteTotal+=Number(p.entrega);

let itens=p.itens.map(i=>i.nome).join(", ");

lista.innerHTML+=`
<tr>
<td>${new Date(p.data).toLocaleDateString()}</td>
<td>${itens}</td>
<td>R$ ${p.total.toFixed(2)}</td>
<td>R$ ${p.entrega.toFixed(2)}</td>
<td>R$ ${p.totalFinal.toFixed(2)}</td>
</tr>
`;

p.itens.forEach(i=>{
produtosContagem[i.nome]=(produtosContagem[i.nome]||0)+1;
});

});

let faturamento=0;

pedidos.forEach(p=>{
faturamento+=Number(p.total)+Number(p.entrega);
});

let totalDespesas=0;

despesas.forEach(d=>{
totalDespesas+=Number(d.valor);
});

let lucro=faturamento-totalDespesas;

document.getElementById("produtosTotal").innerText="R$ "+produtosTotal.toFixed(2);
document.getElementById("freteTotal").innerText="R$ "+freteTotal.toFixed(2);
document.getElementById("faturamentoTotal").innerText="R$ "+faturamento.toFixed(2);
document.getElementById("pedidosTotal").innerText=pedidosFiltrados.length;
document.getElementById("lucroTotal").innerText="R$ "+lucro.toFixed(2);

let topProduto="";
let max=0;

for(let p in produtosContagem){

if(produtosContagem[p]>max){
max=produtosContagem[p];
topProduto=p;
}

}

document.getElementById("topProduto").innerText=topProduto;

let ticket=0;

if(pedidosFiltrados.length>0){
ticket=(produtosTotal+freteTotal)/pedidosFiltrados.length;
}

document.getElementById("ticketMedio").innerText="R$ "+ticket.toFixed(2);

criarGrafico(produtosTotal,freteTotal,totalDespesas);

carregarDespesas();

}

function criarGrafico(prod,frete,desp){

let ctx=document.getElementById("grafico");

if(grafico){
grafico.destroy();
}

grafico=new Chart(ctx,{
type:"bar",
data:{
labels:["Produtos","Frete","Despesas"],
datasets:[{
label:"Financeiro",
data:[prod,frete,desp],
backgroundColor:[
"#2196f3",
"#4caf50",
"#e53935"
]
}]
}
});

}

function addDespesa(){

let desc=document.getElementById("descDespesa").value;
let valor=document.getElementById("valorDespesa").value;

let despesas=JSON.parse(localStorage.getItem("despesas"))||[];

despesas.push({
descricao:desc,
valor:Number(valor),
data:new Date().toISOString()
});

localStorage.setItem("despesas",JSON.stringify(despesas));

document.getElementById("descDespesa").value="";
document.getElementById("valorDespesa").value="";

carregarDespesas();
atualizar();

}

function carregarDespesas(){

let despesas=JSON.parse(localStorage.getItem("despesas"))||[];

let lista=document.getElementById("listaDespesas");

lista.innerHTML="";

despesas.forEach((d,index)=>{

lista.innerHTML+=`

<div class="despesa-item">

<span>${d.descricao} - R$ ${Number(d.valor).toFixed(2)}</span>

<button class="excluir" onclick="excluirDespesa(${index})">Excluir</button>

</div>

`;

});

}

function excluirDespesa(index){

let senha=prompt("Digite a senha para excluir:");

if(senha!==senhaAdmin){

alert("Senha incorreta");
return;

}

let despesas=JSON.parse(localStorage.getItem("despesas"))||[];

despesas.splice(index,1);

localStorage.setItem("despesas",JSON.stringify(despesas));

carregarDespesas();
atualizar();

}

</script>

</body>
</html>
