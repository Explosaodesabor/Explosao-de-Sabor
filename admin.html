<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel de Vendas</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  padding: 15px;
}

.painel {
  max-width: 500px;
  margin: auto;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 10px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.08);
}

.topo {
  display: flex;
  justify-content: space-between;
  font-weight: bold;
}

.valor {
  font-size: 18px;
  margin-top: 5px;
}

h2 {
  text-align: center;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #4caf50;
  color: white;
  margin-top: 10px;
  font-size: 16px;
}
</style>
</head>

<body>

<div class="painel">
  <h2>📊 Painel de Vendas</h2>

  <div id="resumo"></div>
  <div id="itens"></div>

  <button onclick="resetar()">🔄 Zerar Dados</button>
</div>

<script>

function mostrarPainel() {
  let pedidos = localStorage.getItem("listaPedidos");
  pedidos = pedidos ? JSON.parse(pedidos) : [];

  const resumoItens = {};
  let totalGeral = 0;
  let totalFrete = 0;

  pedidos.forEach(p => {
    totalGeral += p.total;
    totalFrete += p.frete;

    p.itens.forEach(item => {
      if (!resumoItens[item.nome]) {
        resumoItens[item.nome] = { qtd: 0, valor: 0 };
      }
      resumoItens[item.nome].qtd++;
      resumoItens[item.nome].valor += item.preco;
    });
  });

  // ITEM MAIS VENDIDO
  let maisVendido = "";
  let maiorQtd = 0;

  Object.entries(resumoItens).forEach(([nome, dados]) => {
    if (dados.qtd > maiorQtd) {
      maiorQtd = dados.qtd;
      maisVendido = nome;
    }
  });

  // RESUMO
  const resumoDiv = document.getElementById("resumo");
  resumoDiv.innerHTML = `
    <div class="card">
      💰 Faturamento Total
      <div class="valor">R$ ${totalGeral.toFixed(2)}</div>
    </div>

    <div class="card">
      🚚 Total de Frete
      <div class="valor">R$ ${totalFrete.toFixed(2)}</div>
    </div>

    <div class="card">
      🥇 Mais Vendido
      <div class="valor">${maisVendido || "Nenhum"}</div>
    </div>
  `;

  // LISTA DE ITENS
  const itensDiv = document.getElementById("itens");
  itensDiv.innerHTML = "<h3>📦 Itens vendidos</h3>";

  Object.entries(resumoItens)
    .sort((a, b) => b[1].qtd - a[1].qtd)
    .forEach(([nome, dados]) => {
      itensDiv.innerHTML += `
        <div class="card">
          <div class="topo">
            <span>${nome}</span>
            <span>${dados.qtd}x</span>
          </div>
          <div class="valor">R$ ${dados.valor.toFixed(2)}</div>
        </div>
      `;
    });
}

function resetar() {
  localStorage.removeItem("listaPedidos");
  mostrarPainel();
}

mostrarPainel();

</script>

</body>
</html>
