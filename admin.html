<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Explosão de Sabor</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

.login{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.login input{
padding:10px;
border-radius:8px;
border:none;
margin-top:10px;
width:200px;
}

.login button{
margin-top:10px;
padding:10px 20px;
border:none;
background:#ff6600;
color:white;
border-radius:8px;
cursor:pointer;
}

.painel{
display:none;
padding:30px;
}

.card{
background:#1c1c1c;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

input{
padding:8px;
border:none;
border-radius:6px;
margin-right:5px;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
background:#ff6600;
color:white;
cursor:pointer;
}

.excluir{
background:#ff4d4d;
}

.despesa-item{
display:flex;
justify-content:space-between;
align-items:center;
background:#222;
padding:10px;
border-radius:8px;
margin-top:8px;
}

.total{
font-size:18px;
margin-top:10px;
color:#00ff9c;
}

canvas{
background:#1c1c1c;
padding:20px;
border-radius:10px;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div class="login" id="login">

<img src="logo.explosãodesabor.png" width="120">

<h2>Painel ADMIN</h2>

<input type="password" id="senha" placeholder="Digite a senha">

<button onclick="entrar()">Entrar</button>

</div>


<!-- PAINEL -->

<div class="painel" id="painel">

<h1>Painel Explosão de Sabor</h1>

<div class="card">

<h3>💰 Resumo</h3>

<p>Vendas: R$ <span id="totalVendas">0</span></p>

<p>Despesas: R$ <span id="totalDespesas">0</span></p>

<p>Lucro: R$ <span id="lucro">0</span></p>

</div>


<div class="card">

<h3>💸 Adicionar Despesa</h3>

<input id="descricaoDespesa" placeholder="Descrição da despesa">

<input id="valorDespesa" type="number" placeholder="Valor">

<button onclick="adicionarDespesa()">Adicionar</button>

<div class="total">
Total Despesas: R$ <span id="totalDespesasPainel">0</span>
</div>

<div id="listaDespesas"></div>

</div>


<div class="card">

<h3>📊 Vendas</h3>

<canvas id="grafico"></canvas>

</div>

</div>


<script>

const senhaAdmin = "admin123";

function entrar(){

let senha = document.getElementById("senha").value;

if(senha === senhaAdmin){

document.getElementById("login").style.display="none";
document.getElementById("painel").style.display="block";

carregarPainel();

}else{

alert("Senha incorreta");

}

}


function carregarPainel(){

carregarDespesas();

atualizarPainel();

criarGrafico();

}



function adicionarDespesa(){

let descricao = document.getElementById("descricaoDespesa").value;

let valor = document.getElementById("valorDespesa").value;

if(descricao=="" || valor==""){

alert("Preencha os campos");

return;

}

let despesas = JSON.parse(localStorage.getItem("despesas")) || [];

despesas.push({

descricao:descricao,
valor:parseFloat(valor)

});

localStorage.setItem("despesas",JSON.stringify(despesas));

document.getElementById("descricaoDespesa").value="";
document.getElementById("valorDespesa").value="";

carregarDespesas();

atualizarPainel();

}



function carregarDespesas(){

let despesas = JSON.parse(localStorage.getItem("despesas")) || [];

let lista = document.getElementById("listaDespesas");

lista.innerHTML="";

let total=0;

despesas.forEach((d,index)=>{

total += Number(d.valor);

lista.innerHTML += `
<div class="despesa-item">

<span>${d.descricao} - R$ ${Number(d.valor).toFixed(2)}</span>

<button class="excluir" onclick="excluirDespesa(${index})">
Excluir
</button>

</div>
`;

});

document.getElementById("totalDespesasPainel").innerText = total.toFixed(2);

}



function excluirDespesa(index){

let senha = prompt("Digite a senha para excluir:");

if(senha !== senhaAdmin){

alert("Senha incorreta");

return;

}

let despesas = JSON.parse(localStorage.getItem("despesas")) || [];

despesas.splice(index,1);

localStorage.setItem("despesas",JSON.stringify(despesas));

carregarDespesas();

atualizarPainel();

}



function atualizarPainel(){

let pedidos = JSON.parse(localStorage.getItem("pedidos")) || [];

let vendas = 0;

pedidos.forEach(p=>{

vendas += Number(p.total);

});

let despesas = JSON.parse(localStorage.getItem("despesas")) || [];

let totalDespesas = 0;

despesas.forEach(d=>{

totalDespesas += Number(d.valor);

});

let lucro = vendas - totalDespesas;

document.getElementById("totalVendas").innerText = vendas.toFixed(2);

document.getElementById("totalDespesas").innerText = totalDespesas.toFixed(2);

document.getElementById("lucro").innerText = lucro.toFixed(2);

}



function criarGrafico(){

let ctx = document.getElementById("grafico");

new Chart(ctx,{

type:"bar",

data:{

labels:["Vendas","Despesas"],

datasets:[{

label:"Financeiro",

data:[

Number(document.getElementById("totalVendas").innerText),

Number(document.getElementById("totalDespesas").innerText)

]

}]

}

});

}

</script>

</body>
</html>
