<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Admin</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
}

.login{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:white;
padding:40px;
border-radius:12px;
text-align:center;
width:300px;
}

.login-box input{
width:100%;
padding:10px;
margin-top:10px;
}

.login-box button{
width:100%;
padding:10px;
margin-top:10px;
background:#4caf50;
color:white;
border:none;
border-radius:8px;
}

.painel{
display:none;
max-width:500px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:10px;
}

button{
width:100%;
padding:10px;
background:#4caf50;
color:white;
border:none;
border-radius:8px;
margin-top:5px;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="login">

<div class="login-box">

<h2>🔒 Painel Admin</h2>

<input type="password" id="senha" placeholder="Digite a senha">

<button onclick="login()">Entrar</button>

</div>

</div>

<div class="painel" id="painel">

<h2>📊 Painel ADMIN</h2>

<input type="date" id="filtroData" onchange="mostrarPainel()">

<div id="resumo"></div>

<canvas id="grafico"></canvas>

<h3>💵 Despesas</h3>

<input id="descDespesa" placeholder="Descrição">
<input id="valorDespesa" type="number" placeholder="Valor">

<button onclick="adicionarDespesa()">Adicionar despesa</button>

<div id="listaDespesas"></div>

<h3>📈 Lucro</h3>

<div id="lucro"></div>

<button onclick="resetar()">Zerar dados</button>

</div>

<script>

const senhaCorreta="1234";

function login(){

const senha=document.getElementById("senha").value;

if(senha===senhaCorreta){

document.querySelector(".login").style.display="none";
document.getElementById("painel").style.display="block";

mostrarPainel();

}else{

alert("Senha incorreta");

}

}

function mostrarPainel(){

let pedidos=JSON.parse(localStorage.getItem("pedidos"))||[];
let despesas=JSON.parse(localStorage.getItem("despesas"))||[];

let totalVendas=0;
let totalEntrega=0;
let qtdPedidos=0;

const produtos={};

pedidos.forEach(p=>{

totalVendas+=p.valor;
totalEntrega+=p.entrega;
qtdPedidos++;

p.produtos.forEach(prod=>{

if(!produtos[prod])produtos[prod]=0;

produtos[prod]++;

});

});

let totalDespesas=0;

despesas.forEach(d=>{

totalDespesas+=d.valor;

});

document.getElementById("resumo").innerHTML=`
<div class="card">📦 Pedidos: ${qtdPedidos}</div>
<div class="card">💰 Total vendido: R$ ${totalVendas.toFixed(2)}</div>
<div class="card">🚚 Entregas: R$ ${totalEntrega.toFixed(2)}</div>
`;

const lucro=totalVendas-totalDespesas;

document.getElementById("lucro").innerHTML=`
<div class="card">Lucro: R$ ${lucro.toFixed(2)}</div>
`;

const ctx=document.getElementById("grafico");

if(window.grafico)window.grafico.destroy();

window.grafico=new Chart(ctx,{
type:"bar",
data:{
labels:Object.keys(produtos),
datasets:[{
label:"Produtos vendidos",
data:Object.values(produtos)
}]
}
});

const lista=document.getElementById("listaDespesas");

lista.innerHTML="";

despesas.forEach(d=>{

lista.innerHTML+=`
<div class="card">
${d.desc} - R$ ${d.valor.toFixed(2)}
</div>
`;

});

}

function adicionarDespesa(){

const desc=document.getElementById("descDespesa").value;
const valor=parseFloat(document.getElementById("valorDespesa").value);

if(!desc||!valor){

alert("Preencha os campos");

return;

}

let despesas=JSON.parse(localStorage.getItem("despesas"))||[];

despesas.push({
desc:desc,
valor:valor
});

localStorage.setItem("despesas",JSON.stringify(despesas));

document.getElementById("descDespesa").value="";
document.getElementById("valorDespesa").value="";

mostrarPainel();

}

function resetar(){

if(confirm("Deseja apagar tudo?")){

localStorage.removeItem("pedidos");
localStorage.removeItem("despesas");

mostrarPainel();

}

}

</script>

</body>
</html>
