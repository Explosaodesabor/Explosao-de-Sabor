<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Admin - Explosão de Sabor</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
margin:0;
background:#111;
color:white;
}

/* LOGIN */

.login{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.logo-login{
width:180px;
margin-bottom:20px;
border-radius:50%;
box-shadow:0 6px 20px rgba(0,0,0,0.4);
}

.login input{
padding:12px;
border-radius:8px;
border:none;
margin-top:10px;
width:200px;
}

.login button{
margin-top:10px;
padding:12px 25px;
border:none;
background:#ff6600;
color:white;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

/* PAINEL */

.painel{
display:none;
padding:20px;
background:#f4f4f4;
color:black;
min-height:100vh;
}

.topo{
display:flex;
align-items:center;
gap:15px;
}

.logo-topo{
width:60px;
border-radius:50%;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-top:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card h3{
margin:0;
font-size:16px;
}

.valor{
font-size:26px;
font-weight:bold;
margin-top:5px;
}

/* SECTIONS */

.section{
background:white;
padding:20px;
border-radius:12px;
margin-top:20px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* TABELA */

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left;
}

/* BOTÕES */

button{
padding:8px 12px;
border:none;
border-radius:6px;
background:#ff6600;
color:white;
cursor:pointer;
}

.excluir{
background:#ff4d4d;
}

/* DESPESAS */

.despesa-item{
display:flex;
justify-content:space-between;
background:#eee;
padding:8px;
margin-top:5px;
border-radius:6px;
}

</style>
</head>

<body>

<div class="login" id="login">

<img src="logo.explosãodesabor.png" class="logo-login">

<h2>Painel ADMIN</h2>

<input type="password" id="senha" placeholder="Digite a senha">

<button onclick="entrar()">Entrar</button>

</div>

<div class="painel" id="painel">

<div class="topo">
<img src="logo.explosãodesabor.png" class="logo-topo">
<h1>Painel Explosão de Sabor</h1>
</div>

<br>

<label>Filtrar data</label>
<input type="date" id="filtroData" onchange="atualizar()">

<div class="cards">

<div class="card">
<h3>Receita Produtos</h3>
<div class="valor" id="produtosTotal">0</div>
</div>

<div class="card">
<h3>Receita Frete</h3>
<div class="valor" id="freteTotal">0</div>
</div>

<div class="card">
<h3>Faturamento</h3>
<div class="valor" id="faturamentoTotal">0</div>
</div>

<div class="card">
<h3>Total Pedidos</h3>
<div class="valor" id="pedidosTotal">0</div>
</div>

<div class="card">
<h3>Lucro</h3>
<div class="valor" id="lucroTotal">0</div>
</div>

</div>

<div class="section">

<h2>Estatísticas</h2>

Produto mais vendido:
<strong id="topProduto"></strong>

<br><br>

Ticket médio:
<strong id="ticketMedio"></strong>

</div>

<div class="section">

<h2>Gráfico financeiro</h2>

<canvas id="grafico"></canvas>

</div>

<div class="section">

<h2>Pedidos</h2>

<table>

<thead>
<tr>
<th>Data</th>
<th>Itens</th>
<th>Produtos</th>
<th>Frete</th>
<th>Total</th>
</tr>
</thead>

<tbody id="listaPedidos"></tbody>

</table>

</div>

<div class="section">

<h2>Despesas</h2>

<input id="descDespesa" placeholder="Descrição">
<input id="valorDespesa" type="number" placeholder="Valor">

<button onclick="addDespesa()">Adicionar</button>

<div id="listaDespesas"></div>

</div>

</div>

<script>

const senhaAdmin="admin123";
let grafico;

function entrar(){

let senha=document.getElementById("senha").value;

if(senha===senhaAdmin){

document.getElementById("login").style.display="none";
document.getElementById("painel").style.display="block";

atualizar();

}else{

alert("Senha incorreta");

}

}

function atualizar(){

let pedidos=JSON.parse(localStorage.getItem("pedidos"))||[];
let despesas=JSON.parse(localStorage.getItem("despesas"))||[];

let filtro=document.getElementById("filtroData").value;

let produtosTotal=0;
let freteTotal=0;

let lista=document.getElementById("listaPedidos");
lista.innerHTML="";

let produtosContagem={};

let pedidosFiltrados=pedidos;

if(filtro){

pedidosFiltrados=pedidos.filter(p=>{

let data=new Date(p.data).toISOString().slice(0,10);
return data===filtro;

});

}

pedidosFiltrados.forEach(p=>{

produtosTotal+=Number(p.total);
freteTotal+=Number(p.entrega);

let itens=p.itens.map(i=>i.nome).join(", ");

lista.innerHTML+=`
<tr>
<td>${new Date(p.data).toLocaleDateString()}</td>
<td>${itens}</td>
<td>R$ ${p.total.toFixed(2)}</td>
<td>R$ ${p.entrega.toFixed(2)}</td>
<td>R$ ${p.totalFinal.toFixed(2)}</td>
</tr>
`;

p.itens.forEach(i=>{
produtosContagem[i.nome]=(produtosContagem[i.nome]||0)+1;
});

});

let faturamento=produtosTotal+freteTotal;

let totalDespesas=0;

despesas.forEach(d=>{
totalDespesas+=Number(d.valor);
});

let lucro=faturamento-totalDespesas;

document.getElementById("produtosTotal").innerText="R$ "+produtosTotal.toFixed(2);
document.getElementById("freteTotal").innerText="R$ "+freteTotal.toFixed(2);
document.getElementById("faturamentoTotal").innerText="R$ "+faturamento.toFixed(2);
document.getElementById("pedidosTotal").innerText=pedidosFiltrados.length;
document.getElementById("lucroTotal").innerText="R$ "+lucro.toFixed(2);

let topProduto="";
let max=0;

for(let p in produtosContagem){

if(produtosContagem[p]>max){
max=produtosContagem[p];
topProduto=p;
}

}

document.getElementById("topProduto").innerText=topProduto;

let ticket=0;

if(pedidosFiltrados.length>0){
ticket=faturamento/pedidosFiltrados.length;
}

document.getElementById("ticketMedio").innerText="R$ "+ticket.toFixed(2);

criarGrafico(produtosTotal,freteTotal,totalDespesas);

carregarDespesas();

}

function criarGrafico(prod,frete,desp){

let ctx=document.getElementById("grafico");

if(grafico){
grafico.destroy();
}

grafico=new Chart(ctx,{
type:"bar",
data:{
labels:["Produtos","Frete","Despesas"],
datasets:[{
label:"Financeiro",
data:[prod,frete,desp]
}]
}
});

}

function addDespesa(){

let desc=document.getElementById("descDespesa").value;
let valor=document.getElementById("valorDespesa").value;

let despesas=JSON.parse(localStorage.getItem("despesas"))||[];

despesas.push({
descricao:desc,
valor:Number(valor),
data:new Date().toISOString()
});

localStorage.setItem("despesas",JSON.stringify(despesas));

document.getElementById("descDespesa").value="";
document.getElementById("valorDespesa").value="";

carregarDespesas();
atualizar();

}

function carregarDespesas(){

let despesas=JSON.parse(localStorage.getItem("despesas"))||[];

let lista=document.getElementById("listaDespesas");

lista.innerHTML="";

despesas.forEach((d,index)=>{

lista.innerHTML+=`

<div class="despesa-item">

<span>${d.descricao} - R$ ${Number(d.valor).toFixed(2)}</span>

<button class="excluir" onclick="excluirDespesa(${index})">Excluir</button>

</div>

`;

});

}

function excluirDespesa(index){

let senha=prompt("Digite a senha para excluir:");

if(senha!==senhaAdmin){

alert("Senha incorreta");
return;

}

let despesas=JSON.parse(localStorage.getItem("despesas"))||[];

despesas.splice(index,1);

localStorage.setItem("despesas",JSON.stringify(despesas));

carregarDespesas();
atualizar();

}

</script>

</body>
</html>
