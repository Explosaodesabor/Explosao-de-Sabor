<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Explosão de Sabor</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

/* LOGIN */

.login{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:#1f1f1f;
padding:40px;
border-radius:12px;
width:320px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,0.6);
}

.logo{
width:140px;
margin-bottom:15px;
}

.login-box input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
}

.login-box button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#25d366;
color:white;
font-size:16px;
}

/* PAINEL */

.painel{
display:none;
max-width:900px;
margin:auto;
padding:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:#1f1f1f;
padding:20px;
border-radius:12px;
}

.card h3{
margin:0;
font-size:18px;
}

.card p{
font-size:22px;
margin-top:10px;
color:#25d366;
}

.box{
background:#1f1f1f;
padding:20px;
border-radius:12px;
margin-top:20px;
}

input{
width:100%;
padding:10px;
border:none;
border-radius:8px;
margin-top:10px;
}

button{
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
background:#25d366;
color:white;
width:100%;
}

/* DESPESAS */

.despesa{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:10px;
background:#2a2a2a;
padding:10px;
border-radius:8px;
}

.btn-excluir{
background:#e53935;
border:none;
color:white;
padding:5px 10px;
border-radius:6px;
cursor:pointer;
width:auto;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div class="login">

<div class="login-box">

<img src="logo.explosãodesabor.png" class="logo">

<h2>Painel Admin</h2>

<input type="password" id="senha" placeholder="Digite a senha">

<button onclick="login()">Entrar</button>

</div>

</div>

<!-- PAINEL -->

<div class="painel" id="painel">

<h1>📊 Painel Explosão de Sabor</h1>

<div class="cards">

<div class="card">
<h3>Pedidos</h3>
<p id="pedidos"></p>
</div>

<div class="card">
<h3>Total Vendido</h3>
<p id="vendas"></p>
</div>

<div class="card">
<h3>Entregas</h3>
<p id="entregas"></p>
</div>

<div class="card">
<h3>Lucro</h3>
<p id="lucro"></p>
</div>

</div>

<div class="box">

<h3>📊 Produtos vendidos</h3>

<canvas id="grafico"></canvas>

</div>

<div class="box">

<h3>💵 Adicionar Despesa</h3>

<input id="descDespesa" placeholder="Descrição">
<input id="valorDespesa" type="number" placeholder="Valor">

<button onclick="adicionarDespesa()">Adicionar</button>

<div id="listaDespesas"></div>

</div>

</div>

<script>

const senhaCorreta="1234";

function login(){

const senha=document.getElementById("senha").value;

if(senha===senhaCorreta){

document.querySelector(".login").style.display="none";
document.getElementById("painel").style.display="block";

mostrarPainel();

}else{

alert("Senha incorreta");

}

}

function mostrarPainel(){

let pedidos=JSON.parse(localStorage.getItem("pedidos"))||[];
let despesas=JSON.parse(localStorage.getItem("despesas"))||[];

let totalVendas=0;
let totalEntrega=0;
let qtdPedidos=0;

const produtos={};

pedidos.forEach(p=>{

totalVendas+=p.valor;
totalEntrega+=p.entrega;
qtdPedidos++;

p.produtos.forEach(prod=>{

if(!produtos[prod])produtos[prod]=0;

produtos[prod]++;

});

});

let totalDespesas=0;

despesas.forEach(d=>{

totalDespesas+=d.valor;

});

document.getElementById("pedidos").innerText=qtdPedidos;
document.getElementById("vendas").innerText="R$ "+totalVendas.toFixed(2);
document.getElementById("entregas").innerText="R$ "+totalEntrega.toFixed(2);

const lucro=totalVendas-totalDespesas;

document.getElementById("lucro").innerText="R$ "+lucro.toFixed(2);

const ctx=document.getElementById("grafico");

if(window.grafico)window.grafico.destroy();

window.grafico=new Chart(ctx,{
type:"bar",
data:{
labels:Object.keys(produtos),
datasets:[{
label:"Produtos vendidos",
data:Object.values(produtos)
}]
}
});

const lista=document.getElementById("listaDespesas");

lista.innerHTML="";

despesas.forEach((d,index)=>{

lista.innerHTML+=`
<div class="despesa">
<span>${d.desc} - R$ ${d.valor.toFixed(2)}</span>
<button class="btn-excluir" onclick="excluirDespesa(${index})">Excluir</button>
</div>
`;

});

}

function adicionarDespesa(){

const desc=document.getElementById("descDespesa").value;
const valor=parseFloat(document.getElementById("valorDespesa").value);

if(!desc||!valor){

alert("Preencha os campos");

return;

}

let despesas=JSON.parse(localStorage.getItem("despesas"))||[];

despesas.push({
desc:desc,
valor:valor
});

localStorage.setItem("despesas",JSON.stringify(despesas));

document.getElementById("descDespesa").value="";
document.getElementById("valorDespesa").value="";

mostrarPainel();

}

function excluirDespesa(index){

const senha=prompt("Digite a senha para excluir");

if(senha!==senhaCorreta){

alert("Senha incorreta");

return;

}

let despesas=JSON.parse(localStorage.getItem("despesas"))||[];

despesas.splice(index,1);

localStorage.setItem("despesas",JSON.stringify(despesas));

mostrarPainel();

}

</script>

</body>
</html>
