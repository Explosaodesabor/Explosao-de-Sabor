<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel ADMIN</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}

.painel{
max-width:500px;
margin:auto;
}

.card{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:10px;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#4caf50;
color:white;
font-size:16px;
}

canvas{
background:white;
border-radius:12px;
padding:10px;
margin-top:10px;
}

</style>
</head>

<body>

<script>

const senhaCorreta = "1234";

const senha = prompt("Digite a senha do painel ADMIN:");

if(senha !== senhaCorreta){

alert("Acesso negado");

window.location.href = "/";

}

</script>

<div class="painel">

<h2>📊 Painel ADMIN</h2>

<input type="date" id="filtroData" onchange="mostrarPainel()">

<div id="resumo"></div>

<canvas id="grafico"></canvas>

<h3>💵 Adicionar Despesa</h3>

<input id="descDespesa" placeholder="Descrição da despesa">
<input id="valorDespesa" type="number" placeholder="Valor">

<button onclick="adicionarDespesa()">Adicionar despesa</button>

<div id="listaDespesas"></div>

<h3>📈 Lucro</h3>

<div id="lucro"></div>

<button onclick="resetar()">🔄 Zerar Dados</button>

</div>

<script>

function mostrarPainel(){

let pedidos = JSON.parse(localStorage.getItem("pedidos")) || [];
let despesas = JSON.parse(localStorage.getItem("despesas")) || [];

const filtro = document.getElementById("filtroData").value;

let totalVendas = 0;
let totalEntrega = 0;
let qtdPedidos = 0;

const produtos = {};

pedidos.forEach(p=>{

if(filtro && p.data !== filtro) return;

totalVendas += p.valor;
totalEntrega += p.entrega;

qtdPedidos++;

p.produtos.forEach(prod=>{

if(!produtos[prod]) produtos[prod]=0;

produtos[prod]++;

});

});

let totalDespesas = 0;

despesas.forEach(d=>{

if(filtro && d.data !== filtro) return;

totalDespesas += d.valor;

});

document.getElementById("resumo").innerHTML = `
<div class="card">📦 Pedidos: ${qtdPedidos}</div>
<div class="card">💰 Total vendido: R$ ${totalVendas.toFixed(2)}</div>
<div class="card">🚚 Total entregas: R$ ${totalEntrega.toFixed(2)}</div>
`;

const lucro = totalVendas - totalDespesas;

document.getElementById("lucro").innerHTML = `
<div class="card">💰 Lucro: R$ ${lucro.toFixed(2)}</div>
`;

const lista = document.getElementById("listaDespesas");

lista.innerHTML="";

despesas.forEach(d=>{

if(filtro && d.data !== filtro) return;

lista.innerHTML += `
<div class="card">
${d.desc} - R$ ${d.valor.toFixed(2)}
</div>
`;

});

const labels = Object.keys(produtos);
const valores = Object.values(produtos);

const ctx = document.getElementById("grafico");

if(window.grafico) window.grafico.destroy();

window.grafico = new Chart(ctx,{
type:"bar",
data:{
labels:labels,
datasets:[{
label:"Produtos vendidos",
data:valores
}]
}
});

}

function adicionarDespesa(){

const desc = document.getElementById("descDespesa").value;
const valor = parseFloat(document.getElementById("valorDespesa").value);

if(!desc || !valor){

alert("Preencha descrição e valor");

return;

}

let despesas = JSON.parse(localStorage.getItem("despesas")) || [];

despesas.push({

desc:desc,
valor:valor,
data:new Date().toISOString().split('T')[0]

});

localStorage.setItem("despesas",JSON.stringify(despesas));

document.getElementById("descDespesa").value="";
document.getElementById("valorDespesa").value="";

mostrarPainel();

}

function resetar(){

if(confirm("Deseja apagar todos os dados?")){

localStorage.removeItem("pedidos");
localStorage.removeItem("despesas");

mostrarPainel();

}

}

mostrarPainel();

</script>

</body>
</html>
