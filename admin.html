<<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel de Vendas</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  padding: 15px;
}

.painel {
  max-width: 500px;
  margin: auto;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 10px;
}

input {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #4caf50;
  color: white;
}

canvas {
  background: white;
  border-radius: 12px;
  padding: 10px;
}
</style>
</head>

<body>

<div class="painel">

  <!-- LOGIN -->
  <div id="login">
    <h2>🔐 Acesso</h2>
    <input type="password" id="senha" placeholder="Digite a senha">
    <button onclick="entrar()">Entrar</button>
  </div>

  <!-- PAINEL -->
  <div id="sistema" style="display:none;">
    <h2>📊 Painel</h2>

    <input type="date" id="filtroData" onchange="mostrarPainel()">

    <div id="resumo"></div>

    <canvas id="grafico"></canvas>

    <div id="itens"></div>

    <button onclick="resetar()">🔄 Zerar Dados</button>
  </div>

</div>

<script>

const SENHA = "1234"; // ALTERE AQUI

function entrar() {
  const s = document.getElementById("senha").value;
  if (s === SENHA) {
    document.getElementById("login").style.display = "none";
    document.getElementById("sistema").style.display = "block";
    mostrarPainel();
  } else {
    alert("Senha incorreta");
  }
}

function mostrarPainel() {
  let pedidos = localStorage.getItem("listaPedidos");
  pedidos = pedidos ? JSON.parse(pedidos) : [];

  const filtro = document.getElementById("filtroData").value;

  const resumoItens = {};
  let totalGeral = 0;
  let totalFrete = 0;

  pedidos.forEach(p => {

    if (filtro && p.data !== filtro) return;

    totalGeral += p.total;
    totalFrete += p.frete;

    p.itens.forEach(item => {
      if (!resumoItens[item.nome]) {
        resumoItens[item.nome] = { qtd: 0, valor: 0 };
      }
      resumoItens[item.nome].qtd++;
      resumoItens[item.nome].valor += item.preco;
    });
  });

  // RESUMO
  document.getElementById("resumo").innerHTML = `
    <div class="card">💰 Total: R$ ${totalGeral.toFixed(2)}</div>
    <div class="card">🚚 Frete: R$ ${totalFrete.toFixed(2)}</div>
  `;

  // ITENS
  const itensDiv = document.getElementById("itens");
  itensDiv.innerHTML = "";

  let labels = [];
  let valores = [];

  Object.entries(resumoItens).forEach(([nome, dados]) => {
    itensDiv.innerHTML += `
      <div class="card">
        ${nome} — ${dados.qtd}x — R$ ${dados.valor.toFixed(2)}
      </div>
    `;

    labels.push(nome);
    valores.push(dados.qtd);
  });

  // GRÁFICO
  const ctx = document.getElementById("grafico");

  if (window.grafico) {
    window.grafico.destroy();
  }

  window.grafico = new Chart(ctx, {
    type: "bar",
    data: {
      labels: labels,
      datasets: [{
        label: "Vendas",
        data: valores
      }]
    }
  });
}

function resetar() {
  localStorage.removeItem("listaPedidos");
  mostrarPainel();
}

</script>

</body>
</html>
