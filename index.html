<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Explosão de Sabor</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  background: #f5f5f5;
  font-size: 16px;
}

header {
  text-align: center;
  background: linear-gradient(135deg, #ff5722, #ff9800);
  color: white;
  padding: 25px 15px;
}

.logo {
  width: 90px;
  border-radius: 50%;
  border: 3px solid white;
  margin-bottom: 10px;
}

h1 { font-size: 22px; margin: 5px 0; }
h2 { font-size: 18px; margin-top: 20px; }

.container {
  padding: 15px;
  max-width: 500px;
  margin: auto;
}

.item {
  background: white;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 12px;
  display: flex;
  justify-content: space-between;
  box-shadow: 0 3px 8px rgba(0,0,0,0.08);
}

button {
  background: #4caf50;
  color: white;
  border: none;
  padding: 12px;
  border-radius: 10px;
}

#painel-vendedor {
  margin-top:20px;
  background:#fff;
  padding:12px;
  border-radius:12px;
}
</style>
</head>

<body>

<header>
<h1>🔥 Explosão de Sabor</h1>
</header>

<div class="container">

<h2>🍍 Cardápio</h2>
<div id="menu"></div>

<h2>🛒 Carrinho</h2>
<ul id="cart-items"></ul>
<p>Total: R$ <span id="total">0</span></p>
<button onclick="sendWhatsApp()">Finalizar Pedido</button>

<!-- PAINEL -->
<div id="painel-vendedor">
  <h3>📊 Painel de Vendas</h3>

  <!-- FILTRO -->
  <input type="date" id="filtroData">

  <div id="painel-vendas"></div>
  <button onclick="resetarPainel()">Zerar Dados</button>
</div>

</div>

<script>

const produtos = [
{ nome: "💥 Explosão", preco: 18 },
{ nome: "💣 Dinamite", preco: 20 },
{ nome: "🌴 Oásis", preco: 22 }
];

let cart = [];

function renderMenu() {
  const menu = document.getElementById("menu");
  produtos.forEach(p => {
    menu.innerHTML += `
    <div class="item">
      ${p.nome} - R$ ${p.preco}
      <button onclick='addToCart("${p.nome}", ${p.preco})'>+</button>
    </div>`;
  });
}

function addToCart(nome, preco) {
  cart.push({ nome, preco });
  updateCart();
}

function updateCart() {
  const list = document.getElementById("cart-items");
  const totalEl = document.getElementById("total");

  list.innerHTML = "";
  let total = 0;

  cart.forEach(item => {
    total += item.preco;
    list.innerHTML += `<li>${item.nome}</li>`;
  });

  totalEl.innerText = total.toFixed(2);
}

function sendWhatsApp() {
  adicionarPedido();
  alert("Pedido salvo!");
}

// 🔥 SALVANDO COM DATA CORRETA
function adicionarPedido() {
  let pedidos = localStorage.getItem("listaPedidos");
  pedidos = pedidos ? JSON.parse(pedidos) : [];

  let total = 0;
  cart.forEach(item => total += item.preco);

  pedidos.push({
    itens: cart,
    total: total,
    frete: 0,
    data: new Date().toLocaleDateString("sv-SE")
  });

  localStorage.setItem("listaPedidos", JSON.stringify(pedidos));

  mostrarPainel();
}

// 🔥 PAINEL CORRIGIDO
function mostrarPainel() {
  let pedidos = localStorage.getItem("listaPedidos");
  pedidos = pedidos ? JSON.parse(pedidos) : [];

  const dataSelecionada = document.getElementById("filtroData").value;

  const resumo = {};
  let totalGeral = 0;

  pedidos.forEach(pedido => {

    let dataPedido = pedido.data;

    // 🔥 CONVERTE SE ESTIVER ERRADO
    if (dataPedido && dataPedido.includes("/")) {
      const [dia, mes, ano] = dataPedido.split("/");
      dataPedido = `${ano}-${mes}-${dia}`;
    }

    if (dataSelecionada && dataPedido !== dataSelecionada) return;

    totalGeral += pedido.total;

    pedido.itens.forEach(item => {
      if (!resumo[item.nome]) {
        resumo[item.nome] = { quantidade: 0 };
      }
      resumo[item.nome].quantidade++;
    });
  });

  const div = document.getElementById("painel-vendas");
  div.innerHTML = "";

  Object.entries(resumo).forEach(([nome, dados]) => {
    div.innerHTML += `<p>${nome}: ${dados.quantidade}</p>`;
  });

  div.innerHTML += `<hr><strong>Total: R$ ${totalGeral.toFixed(2)}</strong>`;
}

function resetarPainel() {
  localStorage.removeItem("listaPedidos");
  mostrarPainel();
}

// 🔥 ATUALIZA AUTOMATICO AO MUDAR DATA
document.getElementById("filtroData").addEventListener("change", mostrarPainel);

renderMenu();
mostrarPainel();

</script>

</body>
</html>
</html>
