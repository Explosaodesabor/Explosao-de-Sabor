<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Explosão de Sabor</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  background: #f5f5f5;
}

header {
  text-align: center;
  background: linear-gradient(135deg, #ff5722, #ff9800);
  color: white;
  padding: 25px 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.logo {
  width: 100px;
  border-radius: 50%;
  margin-bottom: 10px;
  border: 3px solid white;
}

.container {
  padding: 15px;
  max-width: 500px;
  margin: auto;
}

h2 {
  margin-top: 25px;
  color: #333;
}

.item {
  background: white;
  padding: 15px;
  margin-bottom: 12px;
  border-radius: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 3px 8px rgba(0,0,0,0.08);
  transition: 0.2s;
}

.item:hover {
  transform: scale(1.02);
}

small {
  color: #666;
}

button {
  background: linear-gradient(135deg, #4caf50, #2e7d32);
  color: white;
  border: none;
  padding: 8px 12px;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

.remove {
  background: #e53935;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

#cart {
  background: white;
  padding: 15px;
  border-radius: 12px;
  margin-top: 15px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

#cart-items li {
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.whatsapp {
  background: linear-gradient(135deg, #25d366, #1ebe5d);
  width: 100%;
  padding: 14px;
  font-size: 16px;
  border-radius: 10px;
  margin-top: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<header>
<img src="logo.explosãodesabor.png" class="logo">
<h1>🔥 Explosão de Sabor 🥭</h1>

<p>Sabores que surpreendem.<br>Mordeu. Sorriu. Sentiu. Voltou.</p>

<p><strong>🚚 Frete grátis acima de R$50</strong></p>
</header>

<div class="container">

<h2>🍍 Cardápio</h2>
<div id="menu"></div>

<h2>➕ Adicionais</h2>
<div id="extras"></div>

<h2>📍 Seus Dados</h2>
<input type="text" id="name" placeholder="Seu nome">

<select id="bairro" onchange="updateCart()">
<option value="">Selecione seu bairro</option>

<option value="gratis">Parque dos Pinus</option>
<option value="gratis">Planalto Verde</option>
<option value="gratis">Maria Casa Grande</option>
<option value="gratis">Orestes Lopes</option>
<option value="gratis">Heitor Rigon</option>
<option value="gratis">Valentina Figueiredo</option>
<option value="gratis">Cristo Redentor</option>

<option value="3">Centro</option>
<option value="8">Outros bairros</option>
</select>

<input type="text" id="address" placeholder="Rua e número">

<div id="cart">
<h3>🛒 Carrinho</h3>
<ul id="cart-items"></ul>

<p>🚚 Entrega: <span id="entrega">0</span></p>
<p><strong>Total: R$ <span id="total">0</span></strong></p>

<button class="whatsapp" onclick="sendWhatsApp()">
🚀 Finalizar Pedido no WhatsApp
</button>
</div>

</div>

<script>

const phone = "5516981201169";

const produtos = [
{ nome: "💥 Explosão ⭐ MAIS PEDIDO", descricao: "Manga 500ml • temperado", preco: 18 },
{ nome: "💣 Dinamite", descricao: "Abacaxi 500ml • doce e picante", preco: 20 },
{ nome: "🌴 Oásis", descricao: "Mix de frutas 500ml", preco: 22 }
];

const extras = [
{ nome: "Pimenta Preta", preco: 1 },
{ nome: "Canela", preco: 1 },
{ nome: "Gengibre", preco: 1 },
{ nome: "Páprica Doce", preco: 1 },
{ nome: "Noz Moscada", preco: 1 },
{ nome: "Leite Condensado", preco: 1.5 }
];

let cart = [];

function renderMenu() {
  const menu = document.getElementById("menu");
  menu.innerHTML = "";

  produtos.forEach(p => {
    menu.innerHTML += `
    <div class="item">
      <span>
        <strong>${p.nome}</strong><br>
        <small>${p.descricao}</small><br>
        <strong>R$ ${p.preco}</strong>
      </span>
      <button onclick='addToCart("${p.nome}", ${p.preco})'>+</button>
    </div>`;
  });
}

function renderExtras() {
  const extrasDiv = document.getElementById("extras");
  extrasDiv.innerHTML = "";

  extras.forEach(e => {
    extrasDiv.innerHTML += `
    <div class="item">
      <span>➕ ${e.nome} - R$ ${e.preco}</span>
      <button onclick='addToCart("Extra: ${e.nome}", ${e.preco})'>+</button>
    </div>`;
  });
}

function addToCart(nome, preco) {
  cart.push({ nome, preco });
  updateCart();
}

function removeItem(index) {
  cart.splice(index, 1);
  updateCart();
}

function updateCart() {
  const cartItems = document.getElementById("cart-items");
  const totalEl = document.getElementById("total");
  const entregaEl = document.getElementById("entrega");
  const bairro = document.getElementById("bairro").value;

  cartItems.innerHTML = "";
  let total = 0;

  cart.forEach((item, index) => {
    total += item.preco;
    cartItems.innerHTML += `
    <li>
      ${item.nome} - R$ ${item.preco}
      <button class="remove" onclick="removeItem(${index})">x</button>
    </li>`;
  });

  let taxa = 0;

  if (bairro === "gratis") taxa = 0;
  else if (bairro === "3") taxa = 3;
  else if (bairro === "8") taxa = 8;

  if (total >= 50) taxa = 0;

  entregaEl.innerText = taxa === 0 ? "GRÁTIS" : taxa.toFixed(2);
  totalEl.innerText = (total + taxa).toFixed(2);
}

function sendWhatsApp() {
  const nome = document.getElementById("name").value;
  const bairroSelect = document.getElementById("bairro");
  const bairroTexto = bairroSelect.options[bairroSelect.selectedIndex].text;
  const address = document.getElementById("address").value;

  if (nome === "" || bairroTexto === "Selecione seu bairro") {
    alert("Preencha nome e bairro!");
    return;
  }

  let message = "🔥 *Pedido - Explosão de Sabor*%0A%0A";
  message += `👤 Nome: ${nome}%0A`;
  message += `📍 Bairro: ${bairroTexto}%0A`;
  message += `🏠 Endereço: ${address}%0A%0A`;

  let total = 0;

  cart.forEach(item => {
    message += `- ${item.nome} (R$ ${item.preco})%0A`;
    total += item.preco;
  });

  let taxa = 0;
  const bairro = bairroSelect.value;

  if (bairro === "gratis") taxa = 0;
  else if (bairro === "3") taxa = 3;
  else if (bairro === "8") taxa = 8;

  if (total >= 50) taxa = 0;

  message += "%0A";
  message += taxa === 0 ? "🚚 Entrega: GRÁTIS%0A" : `🚚 Entrega: R$ ${taxa}%0A`;
  message += `💰 Total: R$ ${(total + taxa).toFixed(2)}`;

  window.location.href = `https://wa.me/${phone}?text=${message}`;
}

renderMenu();
renderExtras();

</script>

</body>
</html>
