<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Explosão de Sabor</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  background: #f5f5f5;
}

header {
  text-align: center;
  background: linear-gradient(135deg, #ff5722, #ff9800);
  color: white;
  padding: 25px 15px;
}

.logo {
  width: 90px;
  border-radius: 50%;
  border: 3px solid white;
}

.container {
  padding: 15px;
  max-width: 500px;
  margin: auto;
}

.item {
  background: white;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 12px;
  display: flex;
  justify-content: space-between;
}

button {
  background: #4caf50;
  color: white;
  border: none;
  padding: 12px;
  border-radius: 10px;
}

.remove {
  background: red;
  padding: 4px 8px;
}

#cart {
  background: white;
  padding: 15px;
  border-radius: 12px;
}

.whatsapp {
  background: #25d366;
  width: 100%;
  padding: 16px;
}
</style>
</head>

<body>

<header>
<img src="logo.explosãodesabor.png" class="logo">
<h1>🔥 Explosão de Sabor</h1>
</header>

<div class="container">

<h2>Cardápio</h2>
<div id="menu"></div>

<h2>Adicionais</h2>
<div id="extras"></div>

<h2>Seus Dados</h2>
<input type="text" id="name" placeholder="Nome">

<select id="bairro" onchange="updateCart()">
<option value="">Bairro</option>
<option value="0">Grátis</option>
<option value="3">Centro</option>
<option value="8">Outros</option>
</select>

<input type="text" id="address" placeholder="Endereço">

<h2>Pagamento</h2>
<select id="payment">
<option value="">Forma</option>
<option value="Dinheiro">Dinheiro</option>
<option value="PIX">PIX</option>
</select>

<div id="cart">
<ul id="cart-items"></ul>
<p>Total: R$ <span id="total">0</span></p>
<button class="whatsapp" onclick="sendWhatsApp()">Finalizar</button>
</div>

<!-- ADMIN -->
<div id="painel-vendedor" style="display:none; margin-top:20px; background:#fff; padding:15px; border-radius:12px;">
<h3>🔐 Painel Admin</h3>

<input type="password" id="senha" placeholder="Senha">
<button onclick="login()">Entrar</button>

<div id="admin-area" style="display:none;">

<input type="date" id="filtroData" onchange="mostrarPainel()">

<div id="painel"></div>

<button onclick="resetar()">Zerar</button>

</div>
</div>

</div>

<script>

const senhaCorreta = "1234";

function login(){
  if(document.getElementById("senha").value === senhaCorreta){
    document.getElementById("admin-area").style.display="block";
  }else{
    alert("Senha errada");
  }
}

// mostrar só no admin
if(window.location.href.includes("admin")){
  document.getElementById("painel-vendedor").style.display="block";
}

const produtos = [
{nome:"Explosão",preco:18},
{nome:"Dinamite",preco:20}
];

const extras = [
{nome:"Canela",preco:1}
];

let cart=[];

function renderMenu(){
  let menu=document.getElementById("menu");
  produtos.forEach(p=>{
    menu.innerHTML+=`<div class="item">${p.nome} R$${p.preco} <button onclick='add("${p.nome}",${p.preco})'>+</button></div>`;
  });
}

function renderExtras(){
  let ex=document.getElementById("extras");
  extras.forEach(e=>{
    ex.innerHTML+=`<div class="item">${e.nome} R$${e.preco} <button onclick='add("${e.nome}",${e.preco})'>+</button></div>`;
  });
}

function add(nome,preco){
  cart.push({nome,preco});
  updateCart();
}

function updateCart(){
  let total=0;
  let ul=document.getElementById("cart-items");
  ul.innerHTML="";
  cart.forEach(i=>{
    total+=i.preco;
    ul.innerHTML+=`<li>${i.nome}</li>`;
  });
  document.getElementById("total").innerText=total;
}

function sendWhatsApp(){

  let pedidos = JSON.parse(localStorage.getItem("pedidos")||"[]");

  let total=0;
  cart.forEach(i=>total+=i.preco);

  let taxa=0;
  let bairro=document.getElementById("bairro").value;
  if(bairro=="3")taxa=3;
  if(bairro=="8")taxa=8;

  pedidos.push({
    itens:cart,
    total:total+taxa,
    frete:taxa,
    data:new Date().toISOString().split("T")[0]
  });

  localStorage.setItem("pedidos",JSON.stringify(pedidos));

  window.location.href="https://wa.me/5516981201169";
}

function mostrarPainel(){

  let pedidos=JSON.parse(localStorage.getItem("pedidos")||"[]");
  let filtro=document.getElementById("filtroData").value;

  let resumo={};
  let total=0;
  let frete=0;

  pedidos.forEach(p=>{
    if(filtro && p.data!==filtro) return;

    total+=p.total;
    frete+=p.frete;

    p.itens.forEach(i=>{
      if(!resumo[i.nome]) resumo[i.nome]={q:0,v:0};
      resumo[i.nome].q++;
      resumo[i.nome].v+=i.preco;
    });
  });

  let div=document.getElementById("painel");
  div.innerHTML="";

  Object.entries(resumo).forEach(([n,d])=>{
    div.innerHTML+=`<p>${n} - ${d.q} - R$${d.v}</p>`;
  });

  div.innerHTML+=`<hr>Frete: R$${frete}<br>Total: R$${total}`;
}

function resetar(){
  localStorage.removeItem("pedidos");
  mostrarPainel();
}

renderMenu();
renderExtras();

</script>

</body>
</html>
