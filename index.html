<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Explosão de Sabor</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  background: #f5f5f5;
}

header {
  text-align: center;
  background: linear-gradient(135deg, #ff5722, #ff9800);
  color: white;
  padding: 25px;
}

.logo {
  width: 90px;
  border-radius: 50%;
  border: 3px solid white;
}

.container {
  padding: 15px;
  max-width: 500px;
  margin: auto;
}

.item {
  background: white;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 12px;
  display: flex;
  justify-content: space-between;
}

button {
  background: #4caf50;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 10px;
}

.whatsapp {
  background: #25d366;
  width: 100%;
  padding: 15px;
  margin-top: 10px;
}

/* PAINEL */
#painel-vendedor {
  display:none;
  margin-top:20px;
  background:#fff;
  padding:15px;
  border-radius:12px;
}

.cards {
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

.card {
  flex:1;
  background:#fafafa;
  padding:10px;
  border-radius:10px;
  text-align:center;
}
</style>
</head>

<body>

<header>
<img src="logo.explosãodesabor.png" class="logo">
<h1>🔥 Explosão de Sabor</h1>
</header>

<div class="container">

<h2>🍍 Cardápio</h2>
<div id="menu"></div>

<h2>➕ Adicionais</h2>
<div id="extras"></div>

<h2>📍 Seus Dados</h2>
<input id="name" placeholder="Nome">
<select id="bairro" onchange="updateCart()">
<option value="">Bairro</option>
<option value="0">Gratis</option>
<option value="3">Centro</option>
<option value="8">Outros</option>
</select>

<h2>💳 Pagamento</h2>
<select id="payment">
<option value="">Selecione</option>
<option>Dinheiro</option>
<option>PIX</option>
<option>Cartão</option>
</select>

<div id="cart">
<ul id="cart-items"></ul>
<p>Total: R$ <span id="total">0</span></p>
<button class="whatsapp" onclick="send()">Finalizar</button>
</div>

<!-- PAINEL -->
<div id="painel-vendedor">

<h2>🔐 Painel Admin</h2>

<input type="password" id="senha" placeholder="Senha">
<button onclick="login()">Entrar</button>

<div id="conteudo" style="display:none">

<h3>📅 Filtrar Data</h3>
<input type="date" id="filtro" onchange="carregarPainel()">

<div class="cards">
<div class="card">Pedidos<br><b id="pedidos"></b></div>
<div class="card">Frete<br><b id="frete"></b></div>
<div class="card">Total<br><b id="totalGeral"></b></div>
</div>

<canvas id="grafico"></canvas>

<div id="lista"></div>

<button onclick="resetar()">Zerar</button>

</div>

</div>

</div>

<script>

const produtos = [
{nome:"Explosão", preco:18},
{nome:"Dinamite", preco:20},
{nome:"Oásis", preco:22}
];

const extras = [
{nome:"Canela", preco:1},
{nome:"Leite Condensado", preco:1.5}
];

let cart=[];

function renderMenu(){
menu.innerHTML="";
produtos.forEach(p=>{
menu.innerHTML+=`<div class="item">${p.nome} R$${p.preco}
<button onclick="add('${p.nome}',${p.preco})">+</button></div>`;
});
}

function renderExtras(){
extrasDiv.innerHTML="";
extras.forEach(e=>{
extrasDiv.innerHTML+=`<div class="item">${e.nome} R$${e.preco}
<button onclick="add('${e.nome}',${e.preco})">+</button></div>`;
});
}

function add(nome,preco){
cart.push({nome,preco});
updateCart();
}

function updateCart(){
let total=0;
cartItems.innerHTML="";
cart.forEach((i,index)=>{
total+=i.preco;
cartItems.innerHTML+=`${i.nome} <button onclick="remove(${index})">x</button><br>`;
});
totalEl.innerText=total.toFixed(2);
}

function remove(i){
cart.splice(i,1);
updateCart();
}

function send(){

let pedidos=JSON.parse(localStorage.getItem("pedidos")||"[]");

pedidos.push({
itens:cart,
total:cart.reduce((s,i)=>s+i.preco,0),
frete:0,
data:new Date().toISOString().split("T")[0]
});

localStorage.setItem("pedidos",JSON.stringify(pedidos));

alert("Pedido enviado!");

cart=[];
updateCart();
}

function login(){
if(senha.value==="1234"){
conteudo.style.display="block";
carregarPainel();
}
}

function carregarPainel(){

let pedidos=JSON.parse(localStorage.getItem("pedidos")||"[]");
let data=filtro.value;

if(data){
pedidos=pedidos.filter(p=>p.data===data);
}

let resumo={};
let total=0;
let frete=0;

pedidos.forEach(p=>{
total+=p.total;
frete+=p.frete;

p.itens.forEach(i=>{
if(!resumo[i.nome]) resumo[i.nome]={q:0,v:0};
resumo[i.nome].q++;
resumo[i.nome].v+=i.preco;
});
});

pedidosEl.innerText=pedidos.length;
freteEl.innerText=frete;
totalGeral.innerText=total.toFixed(2);

lista.innerHTML="";
Object.entries(resumo).forEach(([n,d])=>{
lista.innerHTML+=`${n} - ${d.q} vendas<br>`;
});

gerarGrafico(resumo);

}

let chart;

function gerarGrafico(resumo){

let labels=Object.keys(resumo);
let data=Object.values(resumo).map(i=>i.q);

if(chart) chart.destroy();

chart=new Chart(grafico,{
type:"bar",
data:{labels,datasets:[{data}]}
});

}

function resetar(){
localStorage.removeItem("pedidos");
carregarPainel();
}

if(location.href.includes("admin")){
painel-vendedor.style.display="block";
}

renderMenu();
renderExtras();

</script>

</body>
</html>
