<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Explosão de Sabor</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #fff3e0;
    }

    header {
      text-align: center;
      background: linear-gradient(45deg, #ff9800, #ff5722);
      color: white;
      padding: 20px;
    }

    .logo {
      width: 140px;
      margin-bottom: 10px;
    }

    .container {
      padding: 15px;
    }

    h2 {
      margin-top: 20px;
    }

    .item {
      background: white;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .item span {
      max-width: 70%;
    }

    small {
      color: #555;
      font-size: 13px;
    }

    button {
      background: #4caf50;
      color: white;
      border: none;
      padding: 6px 10px;
      border-radius: 5px;
      cursor: pointer;
    }

    .remove {
      background: #f44336;
      margin-left: 5px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    #cart {
      margin-top: 20px;
      background: white;
      padding: 15px;
      border-radius: 10px;
    }

    .whatsapp {
      margin-top: 10px;
      background: #25d366;
      width: 100%;
      font-size: 16px;
      padding: 10px;
    }
  </style>
</head>

<body>

<header>
  <img src="logo.png" class="logo">
  <h1>🔥 Explosão de Sabor 🥭</h1>
  <p>Potes de 500ml</p>
</header>

<div class="container">

  <h2>🍍🥭 Cardápio</h2>
  <div id="menu"></div>

  <h2>➕ Adicionais</h2>
  <div id="extras"></div>

  <h2>📍 Seus Dados</h2>
  <input type="text" id="name" placeholder="Seu nome">
  <input type="text" id="address" placeholder="Seu endereço">

  <div id="cart">
    <h3>🛒 Carrinho</h3>
    <ul id="cart-items"></ul>
    <p><strong>Total: R$ <span id="total">0</span></strong></p>
    <button class="whatsapp" onclick="sendWhatsApp()">Enviar Pedido</button>
  </div>

</div>

<script>
  const phone = "551698120169";

  const produtos = [
    { 
      nome: "💥 Explosão", 
      descricao: "Manga 500ml • sal, limão, lemon pepper, páprica picante", 
      preco: 18 
    },
    { 
      nome: "💣 Dinamite", 
      descricao: "Abacaxi 500ml • sal, limão, canela, páprica picante, lemon pepper, leite condensado", 
      preco: 20 
    },
    { 
      nome: "🌴 Oásis", 
      descricao: "Manga + Abacaxi 500ml • sal, limão, lemon pepper, páprica picante, gengibre", 
      preco: 22 
    }
  ];

  const extras = [
    { nome: "Pimenta Preta", preco: 1 },
    { nome: "Canela", preco: 1 },
    { nome: "Gengibre", preco: 1 },
    { nome: "Páprica Doce", preco: 1 },
    { nome: "Noz Moscada", preco: 1 },
    { nome: "Leite Condensado", preco: 1.5 }
  ];

  let cart = [];

  function renderMenu() {
    const menu = document.getElementById("menu");
    menu.innerHTML = "";

    produtos.forEach(p => {
      menu.innerHTML += `
        <div class="item">
          <span>
            <strong>${p.nome}</strong><br>
            <small>${p.descricao}</small><br>
            <strong>R$ ${p.preco}</strong>
          </span>
          <button onclick='addToCart("${p.nome}", ${p.preco})'>+</button>
        </div>
      `;
    });
  }

  function renderExtras() {
    const extrasDiv = document.getElementById("extras");
    extrasDiv.innerHTML = "";

    extras.forEach(e => {
      extrasDiv.innerHTML += `
        <div class="item">
          <span>➕ ${e.nome} - R$ ${e.preco}</span>
          <button onclick='addToCart("Extra: ${e.nome}", ${e.preco})'>+</button>
        </div>
      `;
    });
  }

  function addToCart(nome, preco) {
    cart.push({ nome, preco });
    updateCart();
  }

  function removeItem(index) {
    cart.splice(index, 1);
    updateCart();
  }

  function updateCart() {
    const cartItems = document.getElementById("cart-items");
    const totalEl = document.getElementById("total");

    cartItems.innerHTML = "";
    let total = 0;

    cart.forEach((item, index) => {
      total += item.preco;
      cartItems.innerHTML += `
        <li>
          ${item.nome} - R$ ${item.preco}
          <button class="remove" onclick="removeItem(${index})">x</button>
        </li>
      `;
    });

    totalEl.innerText = total.toFixed(2);
  }

  function sendWhatsApp() {
    const nome = document.getElementById("name").value;
    const address = document.getElementById("address").value;

    if (nome === "" || address === "") {
      alert("Preencha nome e endereço!");
      return;
    }

    if (cart.length === 0) {
      alert("Carrinho vazio!");
      return;
    }

    let message = "🔥 Pedido - Explosão de Sabor:%0A";
    message += `👤 Nome: ${nome}%0A`;
    message += `📍 Endereço: ${address}%0A%0A`;

    let total = 0;

    cart.forEach(item => {
      message += `- ${item.nome} (R$ ${item.preco})%0A`;
      total += item.preco;
    });

    message += `%0ATotal: R$ ${total.toFixed(2)}`;

    const url = `https://wa.me/${phone}?text=${message}`;
    window.open(url, "_blank");
  }

  renderMenu();
  renderExtras();
</script>

</body>
</html>
