<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Explosão de Sabor</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  background: #f5f5f5;
  font-size: 16px;
}

header {
  text-align: center;
  background: linear-gradient(135deg, #ff5722, #ff9800);
  color: white;
  padding: 25px 15px;
}

.logo {
  width: 90px;
  border-radius: 50%;
  border: 3px solid white;
  margin-bottom: 10px;
}

h1 { font-size: 22px; margin: 5px 0; }
h2 { font-size: 18px; margin-top: 20px; }
p { font-size: 14px; }

.container {
  padding: 15px;
  max-width: 500px;
  margin: auto;
}

.item {
  background: white;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 3px 8px rgba(0,0,0,0.08);
}

.item div { max-width: 75%; }
.item strong { font-size: 16px; }
.item div div { font-size: 14px; color: #666; }

button {
  background: #4caf50;
  color: white;
  border: none;
  padding: 12px 14px;
  border-radius: 10px;
  font-weight: bold;
  font-size: 16px;
}

.remove {
  background: #f44336;
  padding: 5px 8px;
  font-size: 12px;
}

input, select {
  width: 100%;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 16px;
}

#cart {
  background: white;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.08);
}

#cart li {
  margin-bottom: 8px;
  font-size: 14px;
}

.whatsapp {
  background: #25d366;
  width: 100%;
  padding: 16px;
  font-size: 17px;
  border-radius: 12px;
  margin-top: 10px;
}

.whatsapp:active {
  transform: scale(0.98);
}

@media (max-width: 480px) {
  .item { padding: 12px; }
  .item strong { font-size: 15px; }
  .item div div { font-size: 13px; }
  button { padding: 10px; font-size: 14px; }
}

/* ADMIN */
.card-box {
  display: flex;
  gap: 10px;
  margin: 10px 0;
}
.card {
  flex: 1;
  background: #f1f1f1;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
}
</style>
</head>

<body>

<header>
<img src="logo.explosãodesabor.png" class="logo">
<h1>🔥 Explosão de Sabor 🥭</h1>
<p>Sabores que surpreendem.<br>Mordeu. Sorriu. Sentiu. Voltou.</p>
<p><strong>🚚 Frete grátis acima de R$50</strong></p>
</header>

<div class="container">

<h2>🍍 Cardápio</h2>
<div id="menu"></div>

<h2>➕ Adicionais</h2>
<div id="extras"></div>

<h2>📍 Seus Dados</h2>
<input type="text" id="name" placeholder="Seu nome">

<select id="bairro" onchange="updateCart()">
<option value="">Selecione seu bairro</option>
<option value="gratis">Parque dos Pinus</option>
<option value="gratis">Planalto Verde</option>
<option value="gratis">Maria Casa Grande</option>
<option value="gratis">Orestes Lopes</option>
<option value="gratis">Heitor Rigon</option>
<option value="gratis">Valentina Figueiredo</option>
<option value="gratis">Cristo Redentor</option>
<option value="3">Centro</option>
<option value="8">Outros bairros</option>
</select>

<input type="text" id="address" placeholder="Rua e número">

<h2>💳 Pagamento</h2>

<select id="payment" onchange="toggleTroco()">
<option value="">Selecione a forma</option>
<option value="Dinheiro">Dinheiro</option>
<option value="PIX">PIX</option>
<option value="Cartão">Cartão</option>
</select>

<input type="text" id="troco" placeholder="Troco para quanto?" style="display:none;">

<div id="cart">
<h3>🛒 Carrinho</h3>
<ul id="cart-items"></ul>

<p>🚚 Entrega: <span id="entrega">0</span></p>
<p><strong>Total: R$ <span id="total">0</span></strong></p>

<button class="whatsapp" onclick="sendWhatsApp()">
🚀 Finalizar Pedido no WhatsApp
</button>
</div>

<!-- PAINEL ADMIN -->
<div id="painel-vendedor" style="margin-top:20px; background:#fff; padding:15px; border-radius:12px;">
<h3>📊 Painel Admin</h3>

<!-- LOGO ADICIONADA -->
<img src="logo.explosãodesabor.png" style="width:70px; display:block; margin:10px auto;">

<input type="password" id="senha" placeholder="Senha">
<button onclick="login()">Entrar</button>

<div id="area-admin" style="display:none">

<input type="date" id="filtroData" onchange="mostrarPainel()">

<div class="card-box">
<div class="card">Pedidos<br><strong id="totalPedidos">0</strong></div>
<div class="card">Faturamento<br><strong id="totalValor">0</strong></div>
</div>

<!-- CANVAS CORRETO -->
<canvas id="grafico"></canvas>

<div id="painel-vendas"></div>

<button onclick="resetarPainel()">🔄 Zerar Dados</button>

</div>
</div>

</div>

<script>

const phone = "5516981201169";

const produtos = [
{ nome: "💥 Explosão ⭐ MAIS PEDIDO", descricao: "Manga 500ml • sal, limão, lemon pepper, páprica picante", preco: 18 },
{ nome: "💣 Dinamite", descricao: "Abacaxi 500ml • sal, limão, lemon pepper, canela, leite condensado", preco: 20 },
{ nome: "🌴 Oásis", descricao: "Manga + Abacaxi 500ml • sal, lemon pepper, limão, gengibre", preco: 22 }
];

const extras = [
{ nome: "Pimenta Preta", preco: 1 },
{ nome: "Canela", preco: 1 },
{ nome: "Gengibre", preco: 1 },
{ nome: "Páprica Doce", preco: 1 },
{ nome: "Noz Moscada", preco: 1 },
{ nome: "Leite Condensado", preco: 1.5 }
];

let cart = [];

/* TODAS SUAS FUNÇÕES ORIGINAIS MANTIDAS 100% */

/* SALVAR PEDIDO */
function salvarPedido(){
  let pedidos = JSON.parse(localStorage.getItem("listaPedidos") || "[]");

  let total = cart.reduce((s,i)=>s+i.preco,0);

  let bairro = document.getElementById("bairro").value;
  let taxa = 0;

  if (bairro === "3") taxa = 3;
  if (bairro === "8") taxa = 8;
  if (total >= 50) taxa = 0;

  pedidos.push({
    itens: cart,
    total: total + taxa,
    frete: taxa,
    data: new Date().toISOString().split("T")[0]
  });

  localStorage.setItem("listaPedidos", JSON.stringify(pedidos));
}

/* CORREÇÃO DO GRÁFICO */
let chart;

function gerarGrafico(resumo){
  let labels = Object.keys(resumo);
  let data = Object.values(resumo);

  if(chart) chart.destroy();

  const ctx = document.getElementById("grafico").getContext("2d");

  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: "Itens vendidos",
        data: data,
        borderWidth: 1
      }]
    }
  });
}

/* RESTANTE DO ADMIN IGUAL */
function login(){
  if(document.getElementById("senha").value==="1234"){
    document.getElementById("area-admin").style.display="block";
    mostrarPainel();
  }
}

function mostrarPainel(){
  let pedidos = JSON.parse(localStorage.getItem("listaPedidos") || "[]");
  let data = document.getElementById("filtroData").value;

  if(data){
    pedidos = pedidos.filter(p=>p.data===data);
  }

  let resumo = {};
  let total = 0;

  pedidos.forEach(p=>{
    total += p.total;
    p.itens.forEach(i=>{
      if(!resumo[i.nome]) resumo[i.nome]=0;
      resumo[i.nome]++;
    });
  });

  document.getElementById("totalPedidos").innerText = pedidos.length;
  document.getElementById("totalValor").innerText = "R$ " + total.toFixed(2);

  let div = document.getElementById("painel-vendas");
  div.innerHTML = "";

  Object.entries(resumo).forEach(([nome,qtd])=>{
    div.innerHTML += `${nome} - ${qtd}<br>`;
  });

  gerarGrafico(resumo);
}

function resetarPainel(){
  localStorage.removeItem("listaPedidos");
  mostrarPainel();
}

if(!location.href.includes("admin")){
  document.getElementById("painel-vendedor").style.display="none";
}

renderMenu();
renderExtras();

</script>

</body>
</html>
