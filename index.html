<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Explosão de Sabor</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #fff3e0;
    }

    header {
      text-align: center;
      background: linear-gradient(45deg, #ff9800, #ff5722);
      color: white;
      padding: 20px;
    }

    .logo {
      width: 140px;
      margin-bottom: 10px;
    }

    .container {
      padding: 15px;
    }

    h2 {
      margin-top: 20px;
    }

    .item {
      background: white;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    button {
      background: #4caf50;
      color: white;
      border: none;
      padding: 6px 10px;
      border-radius: 5px;
      cursor: pointer;
    }

    .remove {
      background: #f44336;
      margin-left: 5px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    #cart {
      margin-top: 20px;
      background: white;
      padding: 15px;
      border-radius: 10px;
    }

    .whatsapp {
      margin-top: 10px;
      background: #25d366;
      width: 100%;
      font-size: 16px;
      padding: 10px;
    }
  </style>
</head>

<body>

<header>
  <img src="logo.explosãodesabor.png" class="logo">
  <h1>🔥 Explosão de Sabor 🥭</h1>
  <p>Potes de 500ml</p>
</header>

<div class="container">

  <h2>🍍🥭 Cardápio</h2>
  <div id="menu"></div>

  <h2>➕ Adicionais</h2>
  <div id="extras"></div>

  <h2>📍 Seus Dados</h2>
  <input type="text" id="name" placeholder="Seu nome">
  <input type="text" id="address" placeholder="Seu endereço">

  <div id="cart">
    <h3>🛒 Carrinho</h3>
    <ul id="cart-items"></ul>
    <p><strong>Total: R$ <span id="total">0</span></strong></p>
    <button class="whatsapp" onclick="sendWhatsApp()">Enviar Pedido</button>
  </div>

</div>

<script>
  const phone = "551698120169"; // SEU NÚMERO

  const produtos = [
  { nome: "Explosao - Manga Temperada 500ml (sal, limao, lemon pepper, paprika picante)", preco: 18 },
  { nome: "Dinamite - Abacaxi Temperado 500ml (sal, limao, canela, paprika picante, lemon pepper, leite condensado)", preco: 20 },
  { nome: "Oasis - Manga + Abacaxi 500ml (sal, limao, lemon pepper, paprika picante, gengibre)", preco: 22 }
];

  const extras = [
    { name: "Pimenta Preta", price: 1 },
    { name: "Canela", price: 1 },
    { name: "Gengibre", price: 1 },
    { name: "Páprica Doce", price: 1 },
    { name: "Noz Moscada", price: 1 },
    { name: "Leite Condensado", price: 1.5 }
  ];

  let cart = [];

  function renderMenu() {
    const menu = document.getElementById("menu");
    products.forEach(p => {
      menu.innerHTML += `
        <div class="item">
          <span>${p.name} - R$ ${p.price}</span>
          <button onclick="addToCart('${p.name}', ${p.price})">+</button>
        </div>
      `;
    });
  }

  function renderExtras() {
    const extrasDiv = document.getElementById("extras");
    extras.forEach(e => {
      extrasDiv.innerHTML += `
        <div class="item">
          <span>➕ ${e.name} - R$ ${e.price}</span>
          <button onclick="addToCart('Extra: ${e.name}', ${e.price})">+</button>
        </div>
      `;
    });
  }

  function addToCart(name, price) {
    cart.push({ name, price });
    updateCart();
  }

  function removeItem(index) {
    cart.splice(index, 1);
    updateCart();
  }

  function updateCart() {
    const cartItems = document.getElementById("cart-items");
    const totalEl = document.getElementById("total");

    cartItems.innerHTML = "";
    let total = 0;

    cart.forEach((item, index) => {
      total += item.price;
      cartItems.innerHTML += `
        <li>
          ${item.name} - R$ ${item.price}
          <button class="remove" onclick="removeItem(${index})">x</button>
        </li>
      `;
    });

    totalEl.innerText = total.toFixed(2);
  }

  function sendWhatsApp() {
    const name = document.getElementById("name").value;
    const address = document.getElementById("address").value;

    if (name === "" || address === "") {
      alert("Preencha nome e endereço!");
      return;
    }

    if (cart.length === 0) {
      alert("Carrinho vazio!");
      return;
    }

    let message = "🔥 Pedido - Explosão de Sabor:%0A";
    message += `👤 Nome: ${name}%0A`;
    message += `📍 Endereço: ${address}%0A%0A`;

    let total = 0;

    cart.forEach(item => {
      message += `- ${item.name} (R$ ${item.price})%0A`;
      total += item.price;
    });

    message += `%0ATotal: R$ ${total.toFixed(2)}`;

    const url = `https://wa.me/${phone}?text=${message}`;
    window.open(url, "_blank");
  }

  renderMenu();
  renderExtras();
</script>

</body>
</html>
