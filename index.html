<script>
const phone="5516981201169";

const produtos=[
{nome:"💥 Explosão ⭐ MAIS PEDIDO",descricao:"Manga 500ml • sal, limão, lemon pepper, páprica picante",preco:18},
{nome:"💣 Dinamite",descricao:"Abacaxi 500ml • sal, limão, lemon pepper, canela, leite condensado",preco:20},
{nome:"🌴 Oásis",descricao:"Manga + Abacaxi 500ml • sal, lemon pepper, limão, gengibre",preco:25}
];

const extras=[
{nome:"Pimenta Preta",preco:1},
{nome:"Canela",preco:1},
{nome:"Gengibre",preco:1},
{nome:"Paprica Doce",preco:1},
{nome:"Noz Moscada",preco:1},
{nome:"Leite Condensado",preco:1.5}
];

let cart=[];
let isAgendamento = false;

function renderMenu(){
const menu=document.getElementById("menu");
menu.innerHTML="";
produtos.forEach((p, index)=>{
menu.innerHTML+=`
<div class="item">
<div>
<strong>${p.nome}</strong><br>
<div>${p.descricao}</div>
<strong>R$ ${p.preco.toFixed(2)}</strong>
</div>
<button onclick="addProdutoToCart(${index})">+</button>
</div>
`;
});
}

function renderExtras(){
const extrasDiv=document.getElementById("extras");
extrasDiv.innerHTML="";
extras.forEach((e, index)=>{
extrasDiv.innerHTML+=`
<div class="item">
<div>➕ ${e.nome} - R$ ${e.preco.toFixed(2)}</div>
<button onclick="addExtraToCart(${index})">+</button>
</div>
`;
});
}

function addProdutoToCart(index) {
const p = produtos[index];
cart.push({nome: p.nome, descricao: p.descricao, preco: p.preco});
updateCart();
}

function addExtraToCart(index) {
const e = extras[index];
cart.push({nome: "Extra: " + e.nome, descricao: "", preco: e.preco});
updateCart();
}

function checarAgendamento(){
const hoje = new Date();
const diaDaSemana = hoje.getDay(); // 0=Dom, 1=Seg, 2=Ter, 3=Qua, 4=Qui, 5=Sex, 6=Sáb

// Força o agendamento em qualquer dia que NÃO seja Sábado (6) ou Domingo (0)
if(diaDaSemana !== 6 && diaDaSemana !== 0){
isAgendamento = true;
const aviso = document.getElementById("agendamento-aviso");
const campos = document.getElementById("agendamento-campos");
if(aviso) {
aviso.innerHTML = "📅 Atenção: Atendimento apenas de Sábado e Domingo. Faça seu AGENDAMENTO abaixo!";
aviso.style.display = "block";
}
if(campos) campos.style.display = "block";
}
}

function removeItem(index){
cart.splice(index,1);
updateCart();
}

function updateCart(){
const cartItems=document.getElementById("cart-items");
const totalEl=document.getElementById("total");
const entregaEl=document.getElementById("entrega");
const bairro=document.getElementById("bairro").value;

cartItems.innerHTML="";
let total=0;

cart.forEach((item,index)=>{
total+=item.preco;
cartItems.innerHTML+=`
<li style="margin-bottom:8px; display:flex; justify-content:space-between; align-items:center;">
<span>${item.nome} - R$ ${item.preco.toFixed(2)}</span>
<button class="remove" onclick="removeItem(${index})">x</button>
</li>
`;
});

let taxa=parseFloat(bairro);
if(isNaN(taxa))taxa=0;
if(total>=50&&bairro!=="")taxa=0;

entregaEl.innerText=taxa===0&&document.getElementById("bairro").value!==""?"GRÁTIS":"R$ "+taxa.toFixed(2);
totalEl.innerText=(total+taxa).toFixed(2);
}

function toggleTroco(){
const payment=document.getElementById("payment").value;
document.getElementById("troco").style.display=payment==="Dinheiro"?"block":"none";
}

function sendWhatsApp(){
const nome=document.getElementById("name").value.trim();
const bairroSelect=document.getElementById("bairro");
const bairroTexto=bairroSelect.options[bairroSelect.selectedIndex].text;
const bairroValor=bairroSelect.value;
const address=document.getElementById("address").value.trim();
const payment=document.getElementById("payment").value;
const troco=document.getElementById("troco").value.trim();

if(!nome){ alert("Por favor, preencha seu nome!"); return; }
if(!bairroValor){ alert("Por favor, selecione seu bairro!"); return; }
if(!address){ alert("Por favor, preencha seu endereço (Rua e número)!"); return; }

if(isAgendamento){
const diaAgendado = document.getElementById("agendamento-dia").value;
const horaAgendada = document.getElementById("agendamento-hora").value;
if(!diaAgendado){ alert("Por favor, selecione o dia para o agendamento!"); return; }
if(!horaAgendada){ alert("Por favor, selecione o horário para o agendamento!"); return; }
}

if(!payment){ alert("Por favor, selecione a forma de pagamento!"); return; }
if(cart.length===0){ alert("Seu carrinho está vazio! Adicione itens antes de finalizar."); return; }

let message="🔥 *Pedido - Explosão de Sabor*\n\n";

if(isAgendamento){
const diaAgendado = document.getElementById("agendamento-dia").value;
const horaAgendada = document.getElementById("agendamento-hora").value;
message+=`📅 *PEDIDO AGENDADO*\n`;
message+=`📆 *Dia:* ${diaAgendado}\n`;
message+=`🕒 *Horário:* ${horaAgendada}\n\n`;
}

message+=`👤 *Cliente:* ${nome}\n`;
message+=`📍 *Bairro:* ${bairroTexto}\n`;
message+=`🏠 *Endereço:* ${address}\n\n`;
message+=`🛒 *Itens do Pedido:*\n`;

let total=0;
cart.forEach(item=>{
message+=`• ${item.nome} (R$ ${item.preco.toFixed(2)})\n`;
total+=item.preco;
});

let taxa=parseFloat(bairroValor);
if(isNaN(taxa))taxa=0;
if(total>=50)taxa=0;

message+="\n";
message+=taxa===0?"🚚 *Entrega:* GRÁTIS\n":`🚚 *Entrega:* R$ ${taxa.toFixed(2)}\n`;
message+=`💳 *Pagamento:* ${payment}\n`;

if(payment==="Dinheiro"){
message+=troco?`💵 *Troco para:* R$ ${troco}\n`:`💵 *Sem troco*\n`;
}

message+=`\n💰 *Total Geral:* R$ ${(total+taxa).toFixed(2)}`;

let pedidos=JSON.parse(localStorage.getItem("pedidos"))||[];
pedidos.push({
data:new Date().toISOString(),
tipo: isAgendamento ? "Agendado" : "Pronta-Entrega",
itens:cart,
total:total,
entrega:taxa,
totalFinal:total+taxa
});
localStorage.setItem("pedidos",JSON.stringify(pedidos));

setTimeout(()=>{
window.location.href=`https://wa.me{phone}?text=${encodeURIComponent(message)}`;
},300);
}

// Inicialização segura
renderMenu();
renderExtras();
checarAgendamento();
</script>
