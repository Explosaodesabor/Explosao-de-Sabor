<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Explosão de Sabor</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  background: #f5f5f5;
  font-size: 16px;
}

header {
  text-align: center;
  background: linear-gradient(135deg, #ff5722, #ff9800);
  color: white;
  padding: 25px 15px;
}

.logo {
  width: 90px;
  border-radius: 50%;
  border: 3px solid white;
  margin-bottom: 10px;
}

h1 { font-size: 22px; margin: 5px 0; }
h2 { font-size: 18px; margin-top: 20px; }

.container {
  padding: 15px;
  max-width: 500px;
  margin: auto;
}

.item {
  background: white;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 3px 8px rgba(0,0,0,0.08);
}

.item div { max-width: 75%; }

button {
  background: #4caf50;
  color: white;
  border: none;
  padding: 12px;
  border-radius: 10px;
}

.remove {
  background: #f44336;
  padding: 5px 8px;
  font-size: 12px;
}

input, select {
  width: 100%;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

#cart {
  background: white;
  padding: 15px;
  border-radius: 12px;
}

.whatsapp {
  background: #25d366;
  width: 100%;
  padding: 16px;
  border-radius: 12px;
}

/* PAINEL */
.painel {
  background: #fff;
  padding: 15px;
  border-radius: 12px;
  margin-top: 20px;
}

.cards {
  display: flex;
  gap: 10px;
}

.card {
  flex: 1;
  background: #f1f1f1;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
}

table {
  width: 100%;
  margin-top: 10px;
  border-collapse: collapse;
}

th, td {
  padding: 8px;
  text-align: center;
  border-bottom: 1px solid #ddd;
}

th {
  background: #ff5722;
  color: white;
}
</style>
</head>

<body>

<header>
<img src="./logo.explosãodesabor.png" class="logo">
<h1>🔥 Explosão de Sabor 🥭</h1>
<p>Sabores que surpreendem.</p>
</header>

<div class="container">

<h2>🍍 Cardápio</h2>
<div id="menu"></div>

<h2>➕ Adicionais</h2>
<div id="extras"></div>

<h2>📍 Seus Dados</h2>
<input type="text" id="name" placeholder="Seu nome">

<select id="bairro" onchange="updateCart()">
<option value="">Selecione seu bairro</option>
<option value="gratis">Parque dos Pinus</option>
<option value="gratis">Planalto Verde</option>
<option value="gratis">Maria Casa Grande</option>
<option value="gratis">Orestes Lopes</option>
<option value="gratis">Heitor Rigon</option>
<option value="gratis">Valentina Figueiredo</option>
<option value="gratis">Cristo Redentor</option>
<option value="3">Centro</option>
<option value="8">Outros bairros</option>
</select>

<input type="text" id="address" placeholder="Rua e número">

<h2>💳 Pagamento</h2>
<select id="payment" onchange="toggleTroco()">
<option value="">Selecione</option>
<option value="Dinheiro">Dinheiro</option>
<option value="PIX">PIX</option>
<option value="Cartão">Cartão</option>
</select>

<input type="text" id="troco" placeholder="Troco" style="display:none;">

<div id="cart">
<h3>🛒 Carrinho</h3>
<ul id="cart-items"></ul>
<p>🚚 Entrega: <span id="entrega">0</span></p>
<p><strong>Total: R$ <span id="total">0</span></strong></p>
<button class="whatsapp" onclick="sendWhatsApp()">Finalizar</button>
</div>

<!-- PAINEL -->
<div class="painel">

<h2>📊 Painel de Vendas</h2>

<img src="./logo.explosãodesabor.png" style="width:70px; display:block; margin:auto;">

<input type="date" id="filtroData" onchange="mostrarPainel()">

<select id="filtroItem" onchange="mostrarPainel()">
<option value="">Todos os itens</option>
</select>

<div class="cards">
<div class="card">💰 Total<br><strong id="totalValor">0</strong></div>
<div class="card">🚚 Frete<br><strong id="totalFrete">0</strong></div>
<div class="card">📦 Pedidos<br><strong id="totalPedidos">0</strong></div>
</div>

<canvas id="grafico"></canvas>

<table>
<thead>
<tr>
<th>Item</th>
<th>Qtd</th>
<th>Faturamento</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

<button onclick="resetar()">Zerar Dados</button>

</div>

</div>

<script>

const phone = "5516981201169";

const produtos = [
{ nome: "💥 Explosão ⭐ MAIS PEDIDO", descricao: "Manga 500ml • sal, limão, lemon pepper, páprica picante", preco: 18 },
{ nome: "💣 Dinamite", descricao: "Abacaxi 500ml • sal, limão, lemon pepper, canela, leite condensado", preco: 20 },
{ nome: "🌴 Oásis", descricao: "Manga + Abacaxi 500ml • sal, lemon pepper, limão, gengibre", preco: 22 }
];

const extras = [
{ nome: "Pimenta Preta", preco: 1 },
{ nome: "Canela", preco: 1 },
{ nome: "Gengibre", preco: 1 },
{ nome: "Páprica Doce", preco: 1 },
{ nome: "Noz Moscada", preco: 1 },
{ nome: "Leite Condensado", preco: 1.5 }
];

let cart = [];
let chart;

/* ORIGINAL */
function renderMenu(){
  const menu = document.getElementById("menu");
  menu.innerHTML="";
  produtos.forEach(p=>{
    menu.innerHTML+=`
    <div class="item">
      <div>
        <strong>${p.nome}</strong><br>
        <div>${p.descricao}</div>
        <strong>R$ ${p.preco}</strong>
      </div>
      <button onclick='addToCart("${p.nome}",${p.preco})'>+</button>
    </div>`;
  });
}

function renderExtras(){
  const extrasDiv = document.getElementById("extras");
  extrasDiv.innerHTML="";
  extras.forEach(e=>{
    extrasDiv.innerHTML+=`
    <div class="item">
      ➕ ${e.nome} - R$ ${e.preco}
      <button onclick='addToCart("Extra: ${e.nome}",${e.preco})'>+</button>
    </div>`;
  });
}

function addToCart(nome, preco){
  cart.push({nome, preco});
  updateCart();
}

function updateCart(){
  let total=0;
  const ul = document.getElementById("cart-items");
  ul.innerHTML="";

  cart.forEach((i,index)=>{
    total+=i.preco;
    ul.innerHTML+=`<li>${i.nome}</li>`;
  });

  document.getElementById("total").innerText=total.toFixed(2);
}

function toggleTroco(){
  const payment=document.getElementById("payment").value;
  document.getElementById("troco").style.display = payment==="Dinheiro"?"block":"none";
}

function sendWhatsApp(){

  let pedidos=JSON.parse(localStorage.getItem("pedidos")||"[]");

  let total = cart.reduce((s,i)=>s+i.preco,0);
  let taxa = 0;

  pedidos.push({
    itens: cart,
    total: total + taxa,
    frete: taxa,
    data: new Date().toISOString().split("T")[0]
  });

  localStorage.setItem("pedidos",JSON.stringify(pedidos));

  alert("Pedido salvo!");
}

/* PAINEL */
function mostrarPainel(){

  let pedidos=JSON.parse(localStorage.getItem("pedidos")||"[]");
  let data=document.getElementById("filtroData").value;
  let filtroItem=document.getElementById("filtroItem").value;

  if(data){
    pedidos=pedidos.filter(p=>p.data===data);
  }

  let resumo={};
  let total=0;
  let frete=0;

  pedidos.forEach(p=>{
    total+=p.total;
    frete+=p.frete;

    p.itens.forEach(i=>{
      if(filtroItem && i.nome!==filtroItem) return;

      if(!resumo[i.nome]){
        resumo[i.nome]={qtd:0, valor:0};
      }

      resumo[i.nome].qtd++;
      resumo[i.nome].valor+=i.preco;
    });
  });

  document.getElementById("totalValor").innerText="R$ "+total.toFixed(2);
  document.getElementById("totalFrete").innerText="R$ "+frete.toFixed(2);
  document.getElementById("totalPedidos").innerText=pedidos.length;

  let tabela=document.getElementById("tabela");
  tabela.innerHTML="";

  Object.entries(resumo).forEach(([nome,dados])=>{
    tabela.innerHTML+=`
    <tr>
      <td>${nome}</td>
      <td>${dados.qtd}</td>
      <td>R$ ${dados.valor.toFixed(2)}</td>
    </tr>`;
  });

  atualizarFiltro(resumo);
  gerarGrafico(resumo);
}

function atualizarFiltro(resumo){
  let select=document.getElementById("filtroItem");
  select.innerHTML='<option value="">Todos</option>';
  Object.keys(resumo).forEach(i=>{
    select.innerHTML+=`<option value="${i}">${i}</option>`;
  });
}

function gerarGrafico(resumo){

  let labels=Object.keys(resumo);
  let data=Object.values(resumo).map(i=>i.qtd);

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("grafico"),{
    type:"bar",
    data:{labels,datasets:[{data}]}
  });
}

function resetar(){
  localStorage.clear();
  mostrarPainel();
}

/* ESCONDER DO CLIENTE */
if (!window.location.href.includes("admin")) {
  document.querySelector(".painel").style.display = "none";
}

renderMenu();
renderExtras();

</script>

</body>
</html>
