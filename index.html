<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Explosão de Sabor</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  background: #f5f5f5;
}

header {
  text-align: center;
  background: linear-gradient(135deg, #ff5722, #ff9800);
  color: white;
  padding: 25px;
}

.logo {
  width: 100px;
  border-radius: 50%;
}

.container {
  padding: 15px;
  max-width: 500px;
  margin: auto;
}

.item {
  background: white;
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
}

button {
  background: #4caf50;
  color: white;
  border: none;
  padding: 8px;
  border-radius: 6px;
}

.remove {
  background: red;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
}

#cart {
  background: white;
  padding: 15px;
  border-radius: 10px;
}

.whatsapp {
  background: #25d366;
  width: 100%;
  padding: 12px;
}
</style>
</head>

<body>

<header>
<h1>🔥 Explosão de Sabor 🥭</h1>
<p>Frete grátis acima de R$50</p>
</header>

<div class="container">

<h2>🍍 Cardápio</h2>
<div id="menu"></div>

<h2>📍 Seus Dados</h2>
<input type="text" id="name" placeholder="Seu nome">

<select id="bairro" onchange="updateCart()">
<option value="">Selecione seu bairro</option>
<option value="gratis">Parque dos Pinus</option>
<option value="3">Centro</option>
<option value="8">Outros bairros</option>
</select>

<input type="text" id="address" placeholder="Rua e número">

<h2>💳 Pagamento</h2>

<select id="payment" onchange="toggleTroco()">
<option value="">Selecione a forma</option>
<option value="Dinheiro">Dinheiro</option>
<option value="PIX (5% OFF)">PIX (5% OFF)</option>
<option value="Cartão">Cartão</option>
</select>

<input type="text" id="troco" placeholder="Troco para quanto?" style="display:none;">

<div id="cart">
<h3>🛒 Carrinho</h3>
<ul id="cart-items"></ul>

<p>🚚 Entrega: <span id="entrega">0</span></p>
<p><strong>Total: R$ <span id="total">0</span></strong></p>

<button class="whatsapp" onclick="sendWhatsApp()">
🚀 Finalizar Pedido
</button>
</div>

</div>

<script>

const phone = "5516981201169";

const produtos = [
{ nome: "💥 Explosão", preco: 18 },
{ nome: "💣 Dinamite", preco: 20 },
{ nome: "🌴 Oásis", preco: 22 }
];

let cart = [];

function renderMenu() {
  const menu = document.getElementById("menu");
  produtos.forEach(p => {
    menu.innerHTML += `
    <div class="item">
      <span>${p.nome} - R$ ${p.preco}</span>
      <button onclick='addToCart("${p.nome}", ${p.preco})'>+</button>
    </div>`;
  });
}

function addToCart(nome, preco) {
  cart.push({ nome, preco });
  updateCart();
}

function removeItem(index) {
  cart.splice(index, 1);
  updateCart();
}

function updateCart() {
  const cartItems = document.getElementById("cart-items");
  const totalEl = document.getElementById("total");
  const entregaEl = document.getElementById("entrega");
  const bairro = document.getElementById("bairro").value;

  cartItems.innerHTML = "";
  let total = 0;

  cart.forEach((item, index) => {
    total += item.preco;
    cartItems.innerHTML += `
    <li>
      ${item.nome} - R$ ${item.preco}
      <button class="remove" onclick="removeItem(${index})">x</button>
    </li>`;
  });

  let taxa = 0;
  if (bairro === "3") taxa = 3;
  if (bairro === "8") taxa = 8;
  if (total >= 50) taxa = 0;

  entregaEl.innerText = taxa === 0 ? "GRÁTIS" : taxa;
  totalEl.innerText = (total + taxa).toFixed(2);
}

function toggleTroco() {
  const payment = document.getElementById("payment").value;
  const troco = document.getElementById("troco");

  if (payment === "Dinheiro") {
    troco.style.display = "block";
  } else {
    troco.style.display = "none";
    troco.value = "";
  }
}

function sendWhatsApp() {
  const nome = document.getElementById("name").value;
  const bairro = document.getElementById("bairro");
  const address = document.getElementById("address").value;
  const payment = document.getElementById("payment").value;
  const troco = document.getElementById("troco").value;

  if (!nome || !payment) {
    alert("Preencha nome e pagamento!");
    return;
  }

  if (cart.length === 0) {
    alert("Adicione itens!");
    return;
  }

  let message = "🔥 *NOVO PEDIDO*%0A%0A";
  message += `👤 ${nome}%0A`;
  message += `📍 ${bairro.options[bairro.selectedIndex].text}%0A`;
  message += `🏠 ${address}%0A%0A`;

  let total = 0;

  cart.forEach(item => {
    message += `🧾 ${item.nome} - R$ ${item.preco}%0A`;
    total += item.preco;
  });

  let taxa = 0;
  if (bairro.value === "3") taxa = 3;
  if (bairro.value === "8") taxa = 8;
  if (total >= 50) taxa = 0;

  message += "%0A";
  message += taxa === 0 ? "🚚 Entrega: GRÁTIS%0A" : `🚚 Entrega: R$ ${taxa}%0A`;

  message += `%0A💳 Pagamento: ${payment}%0A`;

  if (payment === "Dinheiro") {
    if (troco) {
      message += `💵 Troco para: R$ ${troco}%0A`;
    } else {
      message += `💵 Sem troco%0A`;
    }
  }

  message += `💰 Total: R$ ${(total + taxa).toFixed(2)}`;

  window.location.href = `https://wa.me/${phone}?text=${message}`;

  cart = [];
  updateCart();
}

renderMenu();

</script>

</body>
</html>

</script>

</body>
</html>
